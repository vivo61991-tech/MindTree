<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>MindTree</title>

<!-- ===== PWA: manifest, ícones e meta tags de instalação ===== -->
<link rel="manifest" href="manifest.json" />
<link rel="icon" type="image/png" sizes="192x192" href="favicon-192.png" />
<link rel="icon" type="image/png" sizes="512x512" href="favicon-512.png" />
<link rel="apple-touch-icon" href="favicon-192.png" />
<link rel="shortcut icon" href="favicon.ico" />
<meta name="theme-color" content="#16171b" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="MindTree" />
<meta name="description" content="Editor visual de mapas mentais e árvores hierárquicas" />

<style>
  :root{
    --bg:#16171b;
    --bg-canvas:#1c1d22;
    --panel:#222328;
    --panel-2:#2a2b32;
    --border:#3a3b42;
    --border-light:#46474f;
    --text:#eceef2;
    --text-dim:#9a9ba5;
    --text-faint:#6b6c75;
    --accent:#5b8def;
    --accent-2:#4a7adb;
    --danger:#e2554f;
    --success:#3fb37f;
    --radius:10px;
    --radius-sm:6px;
    --shadow:0 4px 20px rgba(0,0,0,.35);
    --topbar-h:56px;
    --dot-color:#33343d;
  }
  @media (prefers-color-scheme: light){
    :root{
      --bg:#f4f5f7;
      --bg-canvas:#eaecf0;
      --panel:#ffffff;
      --panel-2:#f1f2f5;
      --border:#dcdfe4;
      --border-light:#c7cbd3;
      --text:#1c1e22;
      --text-dim:#5c5f68;
      --text-faint:#8b8e96;
      --accent:#3b6fd9;
      --accent-2:#2f5cc0;
      --danger:#d23b35;
      --success:#27915f;
      --shadow:0 4px 20px rgba(20,20,30,.12);
      --dot-color:#d7d9de;
    }
  }
  html[data-theme="dark"]{
    --bg:#16171b;--bg-canvas:#1c1d22;--panel:#222328;--panel-2:#2a2b32;
    --border:#3a3b42;--border-light:#46474f;--text:#eceef2;--text-dim:#9a9ba5;
    --text-faint:#6b6c75;--accent:#5b8def;--accent-2:#4a7adb;--danger:#e2554f;
    --success:#3fb37f;--shadow:0 4px 20px rgba(0,0,0,.35);--dot-color:#33343d;
  }
  html[data-theme="light"]{
    --bg:#f4f5f7;--bg-canvas:#eaecf0;--panel:#ffffff;--panel-2:#f1f2f5;
    --border:#dcdfe4;--border-light:#c7cbd3;--text:#1c1e22;--text-dim:#5c5f68;
    --text-faint:#8b8e96;--accent:#3b6fd9;--accent-2:#2f5cc0;--danger:#d23b35;
    --success:#27915f;--shadow:0 4px 20px rgba(20,20,30,.12);--dot-color:#d7d9de;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;
    width:100%;height:100%;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    overflow:hidden;
    -webkit-tap-highlight-color:transparent;
  }
  button{font-family:inherit;}
  input,textarea{font-family:inherit;}

  /* ===== TOPBAR ===== */
  #topbar{
    position:fixed;top:0;left:0;right:0;height:var(--topbar-h);
    background:color-mix(in srgb, var(--panel) 80%, transparent);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    border-bottom:1px solid var(--border);
    display:flex;align-items:center;
    padding:0 12px;
    gap:8px;
    z-index:100;
  }
  #topbar .brand{
    font-weight:600;font-size:15px;color:var(--text);
    margin-right:8px;white-space:nowrap;
    display:flex;align-items:center;gap:6px;
  }
  #topbar .brand .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);}
  .tb-spacer{flex:1;}
  .tb-btn{
    display:inline-flex;align-items:center;gap:6px;
    height:36px;padding:0 12px;
    background:var(--panel-2);
    border:1px solid var(--border-light);
    border-radius:var(--radius-sm);
    color:var(--text);
    font-size:13px;font-weight:500;
    cursor:pointer;
    transition:background .15s,border-color .15s;
    white-space:nowrap;
  }
  .tb-btn:hover{background:#33343c;border-color:#52535d;}
  .tb-btn:active{transform:translateY(1px);}
  .tb-btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
  .tb-btn.primary:hover{background:var(--accent-2);}
  .tb-btn.icon-only{width:36px;padding:0;justify-content:center;}
  .tb-btn svg{width:16px;height:16px;flex:none;}
  .tb-divider{width:1px;height:24px;background:var(--border-light);margin:0 4px;}
  .tb-btn:disabled,.tb-btn.is-disabled{
    opacity:.45;
    cursor:not-allowed;
    pointer-events:none;
  }
  .tb-btn.primary:disabled,.tb-btn.primary.is-disabled{
    background:var(--panel-2);
    border-color:var(--border-light);
    color:var(--text-faint);
  }

  #mode-toggle{
    display:flex;background:var(--panel-2);border:1px solid var(--border-light);
    border-radius:var(--radius-sm);overflow:hidden;height:36px;
  }
  #mode-toggle button{
    border:none;background:transparent;color:var(--text-dim);
    padding:0 14px;font-size:13px;font-weight:500;cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:6px;
    transition:background .15s,color .15s;
    width:92px;
  }
  #mode-toggle button.active{background:var(--accent);color:#fff;}

  /* ===== CANVAS ===== */
  #canvas-wrap{
    position:fixed;
    inset:0;
    overflow:hidden;
    background:
      radial-gradient(circle, var(--dot-color) 1px, transparent 1px);
    background-size:24px 24px;
    background-color:var(--bg-canvas);
  }
  #canvas-inner{
    position:relative;
    width:100%;height:100%;
  }
  svg#tree-svg{
    display:block;
    width:100%;
    height:100%;
    cursor:grab;
  }
  svg#tree-svg.panning{
    cursor:grabbing;
  }

  /* ---- CONTROLES DE ZOOM (canto inferior direito) ---- */
  #zoom-controls{
    position:fixed;
    right:20px;bottom:20px;
    display:flex;flex-direction:column;
    background:var(--panel);
    border:1px solid var(--border-light);
    border-radius:var(--radius-sm);
    box-shadow:var(--shadow);
    overflow:hidden;
    z-index:60;
  }
  .zoom-btn{
    width:38px;height:38px;
    display:flex;align-items:center;justify-content:center;
    background:transparent;
    border:none;
    color:var(--text-dim);
    cursor:pointer;
    transition:background .15s,color .15s;
  }
  .zoom-btn:hover{background:var(--panel-2);color:var(--text);}
  .zoom-btn svg{width:17px;height:17px;}
  .zoom-divider{height:1px;background:var(--border);}
  #zoom-pct{
    font-size:10.5px;
    color:var(--text-faint);
    text-align:center;
    padding:3px 0;
    border-top:1px solid var(--border);
    user-select:none;
  }

  /* ---- BARRA DE CONTROLES DE NÍVEL (centralizada embaixo) ---- */
  #level-controls{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    background:var(--panel);
    border:1px solid var(--border-light);
    border-radius:var(--radius-sm);
    box-shadow:var(--shadow);
    overflow:hidden;
    z-index:60;
  }
  .level-btn{
    width:42px;height:38px;
    display:flex;align-items:center;justify-content:center;
    background:transparent;
    border:none;
    border-right:1px solid var(--border);
    color:var(--text-dim);
    cursor:pointer;
    transition:background .15s,color .15s;
  }
  .level-btn:last-child{border-right:none;}
  .level-btn:hover{background:var(--panel-2);color:var(--text);}
  .level-btn:active{background:var(--panel-2);color:var(--accent);}
  .level-glyph{
    font-size:15px;
    line-height:1;
    user-select:none;
    /* força renderização como texto/símbolo monocromático (herda a cor do
       botão), em vez do emoji colorido que alguns navegadores usam por
       padrão para ⏪ e ⏩ — mesmo efeito visual de ⏮, ▶ e ⏭ */
    font-variant-emoji: text;
    font-family: "Segoe UI Symbol", "Noto Sans Symbols", "Apple Symbols", system-ui, sans-serif;
    -webkit-font-feature-settings: "liga" off;
    font-feature-settings: "liga" off;
  }

  /* ---- NOME DO PROJETO (título solto, centralizado, topo) ---- */
  #project-name-bar{
    position:fixed;
    top:calc(var(--topbar-h) + 14px);
    left:50%;
    transform:translateX(-50%);
    display:flex;
    align-items:center;
    gap:8px;
    font-size:22px;
    font-weight:700;
    letter-spacing:-.01em;
    color:var(--text);
    z-index:55;
    user-select:none;
    pointer-events:none;
    max-width:80vw;
    text-align:center;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  #project-name-unsaved{
    display:none;
    color:var(--accent);
    font-size:10px;
    line-height:1;
    flex:none;
  }
  #project-name-unsaved.show{display:inline;}

  /* ---- TOAST DE CONFIRMAÇÃO (salvo com sucesso) ---- */
  #save-toast{
    position:fixed;
    bottom:78px;
    left:50%;
    transform:translateX(-50%) translateY(8px);
    background:var(--success, #3fb37f);
    color:#fff;
    font-size:13px;
    font-weight:600;
    padding:9px 18px;
    border-radius:999px;
    box-shadow:var(--shadow);
    z-index:200;
    display:flex;
    align-items:center;
    gap:7px;
    opacity:0;
    pointer-events:none;
    transition:opacity .2s ease, transform .2s ease;
  }
  #save-toast.show{
    opacity:1;
    transform:translateX(-50%) translateY(0);
  }
  #save-toast svg{width:15px;height:15px;flex:none;}

  /* ---- BOTÃO DE LUPA (busca fica escondida atrás dele, sempre) ---- */
  #search-toggle-btn{
    display:flex;
    position:fixed;
    top:calc(var(--topbar-h) + 10px);
    right:14px;
    width:38px;height:38px;
    align-items:center;justify-content:center;
    background:color-mix(in srgb, var(--panel) 88%, transparent);
    backdrop-filter:blur(6px);
    -webkit-backdrop-filter:blur(6px);
    border:1px solid var(--border-light);
    border-radius:50%;
    color:var(--text-dim);
    box-shadow:var(--shadow);
    cursor:pointer;
    z-index:61;
  }
  #search-toggle-btn svg{width:18px;height:18px;}
  #search-toggle-btn:hover{color:var(--text);}

  /* ---- BOTÃO DE MENU (flutuante, canto inferior esquerdo, mesmo estilo da lupa) ---- */
  #btn-menu{
    display:flex;
    position:fixed;
    left:14px;
    bottom:14px;
    width:38px;height:38px;
    align-items:center;justify-content:center;
    background:color-mix(in srgb, var(--panel) 88%, transparent);
    backdrop-filter:blur(6px);
    -webkit-backdrop-filter:blur(6px);
    border:1px solid var(--border-light);
    border-radius:50%;
    color:var(--text-dim);
    box-shadow:var(--shadow);
    cursor:pointer;
    z-index:61;
  }
  #btn-menu svg{width:18px;height:18px;}
  #btn-menu:hover{color:var(--text);}
  #search-bar{
    display:none;
    position:fixed;
    top:calc(var(--topbar-h) + 64px);
    left:50%;
    transform:translateX(-50%);
    width:min(360px, 80vw);
    z-index:60;
  }
  #search-input-wrap{
    display:flex;align-items:center;gap:8px;
    background:color-mix(in srgb, var(--panel) 82%, transparent);
    backdrop-filter:blur(6px);
    -webkit-backdrop-filter:blur(6px);
    border:1px solid var(--border-light);
    border-radius:var(--radius-lg, 20px);
    padding:8px 14px;
    box-shadow:var(--shadow);
  }
  #search-input-wrap svg{width:16px;height:16px;color:var(--text-faint);flex:none;}
  #search-input{
    flex:1;
    border:none;background:transparent;outline:none;
    color:var(--text);font-size:13.5px;
  }
  #search-input::placeholder{color:var(--text-faint);}
  #search-nav{
    display:flex;align-items:center;gap:2px;flex:none;
  }
  #search-count{
    font-size:11px;color:var(--text-faint);
    white-space:nowrap;padding:0 4px;
  }
  .search-nav-btn{
    width:22px;height:22px;
    display:flex;align-items:center;justify-content:center;
    background:transparent;border:none;border-radius:4px;
    color:var(--text-dim);cursor:pointer;
  }
  .search-nav-btn:hover{background:var(--panel-2);color:var(--text);}
  .search-nav-btn svg{width:13px;height:13px;}
  .search-clear-btn{
    width:20px;height:20px;
    display:flex;align-items:center;justify-content:center;
    background:transparent;border:none;border-radius:50%;
    color:var(--text-faint);cursor:pointer;flex:none;
  }
  .search-clear-btn:hover{background:var(--panel-2);color:var(--text);}
  .search-clear-btn svg{width:13px;height:13px;}

  /* ---- PREVIEW DO RESULTADO DA BUSCA (mini cápsula, logo abaixo) ---- */
  #search-preview{
    display:flex;align-items:center;justify-content:center;gap:8px;
    margin:8px auto 0;
    width:fit-content;
    max-width:100%;
    background:var(--accent);
    color:#fff;
    font-size:13px;font-weight:600;
    padding:7px 16px;
    border-radius:999px;
    box-shadow:var(--shadow);
    pointer-events:none;
    user-select:none;
    animation:search-preview-pop .15s ease;
  }
  #search-preview-name{
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
    max-width:240px;
  }
  #search-preview-count{
    font-size:11px;font-weight:700;
    opacity:.85;
    flex:none;
  }
  @keyframes search-preview-pop{
    from{ opacity:0; transform:translateY(-4px); }
    to{ opacity:1; transform:translateY(0); }
  }

  /* destaque de cápsula encontrada na busca */
  .capsule-rect.search-match{
    stroke:#ffc83c;
    stroke-width:3;
  }
  .capsule-rect.search-current{
    stroke:#ffc83c;
    stroke-width:4;
    filter:drop-shadow(0 0 8px rgba(255,200,60,.7));
  }

  /* ---- NÓ (círculo que expande/colapsa) ---- */
  .tree-node-circle{cursor:pointer;}
  .tree-node-circle.has-children{cursor:pointer;}
  .circle-base{
    transition:filter .15s,r .15s;
  }
  .tree-node-circle:hover .circle-base{filter:brightness(1.15);}
  .tree-node-circle.focused .circle-base{filter:drop-shadow(0 0 0 4px rgba(91,141,239,.35));}
  .circle-glyph{
    stroke:var(--panel);
    stroke-width:1.6;
    stroke-linecap:round;
    pointer-events:none;
  }

  /* ---- CÁPSULA (título, sem borda) ---- */
  .tree-capsule{cursor:pointer;}
  .capsule-rect{
    transition:filter .15s;
    filter:drop-shadow(0 1px 4px rgba(0,0,0,.16));
  }
  .tree-capsule:hover .capsule-rect{filter:drop-shadow(0 2px 8px rgba(0,0,0,.24)) brightness(1.06);}
  .tree-capsule.focused .capsule-rect{filter:drop-shadow(0 0 0 3px rgba(91,141,239,.4)) drop-shadow(0 2px 8px rgba(0,0,0,.2));}
  .capsule-label{
    font-size:13px;
    font-weight:600;
    pointer-events:none;
    dominant-baseline:central;
  }
  .link-path{
    fill:none;
    stroke-width:2;
  }

  .add-btn-group{cursor:pointer;}
  .add-btn-circle{
    fill:var(--panel);
    stroke:var(--accent);
    stroke-width:1.5;
    transition:fill .15s,transform .15s;
    transform-origin:center;
    transform-box:fill-box;
  }
  .add-btn-group:hover .add-btn-circle{fill:var(--accent);transform:scale(1.12);}
  .add-btn-plus{
    stroke:var(--accent);
    stroke-width:1.8;
    stroke-linecap:round;
    pointer-events:none;
    transition:stroke .15s;
  }
  .add-btn-group:hover .add-btn-plus{stroke:#fff;}

  .edit-btn-group{cursor:pointer;}
  .edit-btn-circle{
    fill:var(--panel);
    stroke:var(--text-faint);
    stroke-width:1.3;
    transition:fill .15s,stroke .15s;
  }
  .edit-btn-group:hover .edit-btn-circle{fill:var(--panel-2);stroke:var(--text-dim);}

  /* ===== EMPTY STATE ===== */
  #empty-hint{
    position:fixed;
    top:calc(var(--topbar-h) + 24px);left:50%;
    transform:translateX(-50%);
    color:var(--text-faint);
    font-size:13px;
    pointer-events:none;
    display:none;
  }

  /* ===== SCROLLBARS ===== */
  #canvas-wrap::-webkit-scrollbar{width:10px;height:10px;}
  #canvas-wrap::-webkit-scrollbar-track{background:transparent;}
  #canvas-wrap::-webkit-scrollbar-thumb{background:#3a3b42;border-radius:5px;}
  #canvas-wrap::-webkit-scrollbar-thumb:hover{background:#46474f;}

  /* ===== RESPONSIVE ===== */
  @media (max-width:640px){
    #topbar .brand span.full{display:none;}
    .tb-btn span.label{display:none;}
    .tb-btn{padding:0;width:36px;justify-content:center;}
    .tb-btn.has-label{width:auto;padding:0 10px;}
  }

  /* ===== OVERLAY / MODAL (edição) ===== */
  .mt-overlay{
    position:fixed;inset:0;
    background:rgba(10,11,14,.55);
    backdrop-filter:blur(2px);
    display:flex;align-items:center;justify-content:center;
    z-index:1000;
    padding:20px;
    animation:mt-fade .15s ease;
  }
  @keyframes mt-fade{from{opacity:0;}to{opacity:1;}}
  .mt-modal{
    width:100%;max-width:420px;
    background:var(--panel);
    border:1px solid var(--border-light);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    overflow:hidden;
    animation:mt-pop .15s ease;
  }
  @keyframes mt-pop{from{transform:scale(.96);opacity:0;}to{transform:scale(1);opacity:1;}}
  .mt-modal-head{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 16px;
    border-bottom:1px solid var(--border);
    font-size:14px;font-weight:600;
    gap:10px;
  }
  .mt-modal-head-left{
    display:flex;align-items:center;gap:8px;
    min-width:0;flex:1;
  }
  .mt-modal-head-left span{
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  .mt-back{
    background:var(--panel-2);border:1px solid var(--border-light);
    color:var(--text-dim);
    width:26px;height:26px;border-radius:6px;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;flex:none;
    transition:background .15s,color .15s;
  }
  .mt-back:hover{background:var(--panel);color:var(--text);}
  .mt-back svg{width:15px;height:15px;}
  .mt-x{
    background:none;border:none;color:var(--text-dim);
    font-size:22px;line-height:1;cursor:pointer;padding:0 4px;
  }
  .mt-x:hover{color:var(--text);}
  .mt-modal-body{padding:16px;display:flex;flex-direction:column;gap:6px;}
  .mt-label{font-size:12px;color:var(--text-dim);font-weight:500;margin-top:8px;}
  .mt-label:first-child{margin-top:0;}
  .mt-input,.mt-textarea{
    width:100%;
    background:var(--panel-2);
    border:1px solid var(--border-light);
    border-radius:var(--radius-sm);
    color:var(--text);
    padding:9px 11px;
    font-size:14px;
    outline:none;
    transition:border-color .15s;
  }
  .mt-input:focus,.mt-textarea:focus{border-color:var(--accent);}
  .mt-textarea{min-height:90px;resize:vertical;line-height:1.5;}
  .mt-modal-foot{
    display:flex;align-items:center;justify-content:space-between;
    padding:12px 16px;border-top:1px solid var(--border);
  }
  .mt-btn{
    height:36px;padding:0 16px;border-radius:var(--radius-sm);
    border:1px solid var(--border-light);
    background:var(--panel-2);color:var(--text);
    font-size:13px;font-weight:500;cursor:pointer;
  }
  .mt-btn:hover{background:#33343c;}
  .mt-btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
  .mt-btn.primary:hover{background:var(--accent-2);}
  .mt-btn.danger{background:transparent;border-color:var(--danger);color:var(--danger);}
  .mt-btn.danger:hover{background:rgba(226,85,79,.12);}

  /* ===== PAINEL DE VISUALIZAÇÃO ===== */
  .mt-view-overlay{align-items:center;}
  .mt-view-panel{
    width:100%;max-width:460px;max-height:80vh;
    background:var(--panel);
    border:1px solid var(--border-light);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    display:flex;flex-direction:column;
    animation:mt-pop .15s ease;
  }
  .mt-view-panel .mt-modal-body{overflow-y:auto;}
  .mt-view-text{font-size:14px;line-height:1.6;color:var(--text-dim);margin:0 0 14px;}
  .mt-view-text.mt-faint{color:var(--text-faint);font-style:italic;}
  .mt-children-title{font-size:12px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:.03em;margin-bottom:8px;}
  .mt-children-list{display:flex;flex-direction:column;gap:6px;}
  .mt-child-row{
    display:flex;align-items:center;gap:10px;
    padding:10px 12px;
    background:var(--panel-2);
    border:1px solid var(--border);
    border-radius:var(--radius-sm);
    cursor:pointer;
    transition:border-color .15s,background .15s;
    max-width:100%;
  }
  .mt-child-row:hover{border-color:var(--accent);background:#2c2d35;}
  .mt-child-main{flex:1 1 0%;min-width:0;overflow:hidden;}
  .mt-child-name{font-size:13.5px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .mt-child-text{
    font-size:12px;color:var(--text-faint);margin-top:2px;
    overflow:hidden;text-overflow:ellipsis;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
    word-break:break-word;
  }
  .mt-child-count{
    font-size:11px;font-weight:600;color:var(--accent);
    background:rgba(91,141,239,.15);
    border-radius:10px;padding:2px 7px;flex:none;
  }
  .mt-chevron{width:16px;height:16px;color:var(--text-faint);flex:none;}
  .mt-empty-children{font-size:13px;color:var(--text-faint);font-style:italic;padding:8px 0;}

  /* ===== DRAWER PLANILHA ===== */
  .sheet-overlay{
    position:fixed;inset:0;background:rgba(10,11,14,.4);
    z-index:500;opacity:0;pointer-events:none;transition:opacity .2s;
  }
  .sheet-overlay.open{opacity:1;pointer-events:auto;}
  .sheet-drawer{
    position:fixed;top:0;right:0;bottom:0;
    width:min(560px, 92vw);
    background:var(--panel);
    border-left:1px solid transparent;
    box-shadow:none;
    z-index:501;
    display:flex;flex-direction:column;
    transform:translateX(100%);
    transition:transform .25s ease, box-shadow .25s ease, border-color .25s ease;
  }
  .sheet-drawer.open{
    transform:translateX(0);
    border-left-color:var(--border-light);
    box-shadow:-8px 0 30px rgba(0,0,0,.4);
  }
  /* variante: drawer abre pelo lado ESQUERDO da tela (menu principal e
     submenus como Cores, Estilo, Projetos) — a Planilha continua à direita,
     já que costuma ser consultada lado a lado com a árvore que cresce à direita */
  .sheet-drawer.drawer-left{
    left:0;right:auto;
    border-left:none;
    border-right:1px solid transparent;
    transform:translateX(-100%);
  }
  .sheet-drawer.drawer-left.open{
    transform:translateX(0);
    border-right-color:var(--border-light);
    box-shadow:8px 0 30px rgba(0,0,0,.4);
  }
  .sheet-head{
    display:flex;align-items:center;justify-content:space-between;
    padding:16px 18px;border-bottom:1px solid var(--border);
    font-size:15px;font-weight:600;
  }
  .sheet-toolbar{padding:10px 18px;border-bottom:1px solid var(--border);}
  .sheet-info{font-size:12px;color:var(--text-faint);}
  .sheet-table-wrap{flex:1;overflow:auto;padding:0;}
  table#sheet-table{
    border-collapse:collapse;width:100%;font-size:13px;
  }
  table#sheet-table th{
    position:sticky;top:0;
    background:var(--panel-2);
    color:var(--text-dim);
    font-weight:600;font-size:11.5px;
    border-bottom:1px solid var(--border-light);
    text-align:left;
    white-space:nowrap;
    padding:0;
  }
  .sheet-header-input{
    width:100%;min-width:90px;
    background:transparent;
    border:none;outline:none;
    color:var(--text-dim);
    font-weight:600;font-size:11.5px;
    text-transform:uppercase;letter-spacing:.03em;
    padding:9px 10px;
    font-family:inherit;
  }
  .sheet-header-input:focus{
    background:var(--panel);
    box-shadow:inset 0 0 0 1.5px var(--accent);
    color:var(--text);
  }
  table#sheet-table td{
    border-bottom:1px solid var(--border);
    border-right:1px solid var(--border);
    padding:0;
    vertical-align:top;
  }
  table#sheet-table td.sheet-cell-empty{background:transparent;}
  .sheet-cell-input{
    width:100%;min-width:140px;
    background:transparent;
    border:none;outline:none;
    color:var(--text);
    padding:8px 10px;
    font-size:13px;font-family:inherit;
    resize:none;
  }
  .sheet-cell-input:focus{background:var(--panel-2);box-shadow:inset 0 0 0 1.5px var(--accent);}
  .sheet-rel-col{
    color:var(--text-faint);font-size:11px;
    padding:8px 8px;white-space:nowrap;
  }

  /* ===== DRAWER ESTILO ===== */
  .style-drawer{
    width:min(360px, 92vw);
  }
  .style-body{
    flex:1;overflow-y:auto;
    padding:18px;
    display:flex;flex-direction:column;gap:24px;
  }
  .style-section-title{
    font-size:12px;font-weight:600;
    color:var(--text-dim);
    text-transform:uppercase;letter-spacing:.03em;
    margin-bottom:10px;
  }
  .style-options{
    display:flex;gap:8px;
  }
  .style-option-btn{
    flex:1;
    display:flex;flex-direction:column;align-items:center;gap:6px;
    background:var(--panel-2);
    border:1.5px solid var(--border);
    border-radius:var(--radius-sm);
    padding:10px 6px;
    cursor:pointer;
    transition:border-color .15s,background .15s;
  }
  .style-option-btn:hover{border-color:var(--border-light);}
  .style-option-btn.active{
    border-color:var(--accent);
    background:rgba(91,141,239,.08);
  }
  .style-option-btn svg{
    width:48px;height:22px;
    fill:none;
    stroke:var(--text-dim);
    stroke-width:2;
  }
  .style-option-btn.active svg{stroke:var(--accent);}
  .style-option-btn span{
    font-size:11px;
    color:var(--text-dim);
    font-weight:500;
    text-align:center;
  }
  .style-option-btn.active span{color:var(--accent);}

  /* ===== DRAWER PROJETOS ===== */
  .projects-drawer{
    width:min(360px, 92vw);
  }
  .projects-toolbar{
    padding:14px 18px;
    flex:none;
  }
  .projects-toolbar-top{
    border-bottom:1px solid var(--border);
  }
  .projects-toolbar-bottom{
    border-top:1px solid var(--border);
  }
  .projects-list{
    flex:1 1 auto;min-height:0;overflow-y:auto;
    padding:14px 18px;
    display:flex;flex-direction:column;gap:8px;
  }
  .projects-empty{
    font-size:13px;color:var(--text-faint);font-style:italic;
    text-align:center;padding:30px 0;
  }
  .project-row{
    display:flex;align-items:center;gap:10px;
    padding:12px 14px;
    background:var(--panel-2);
    border:1px solid var(--border);
    border-radius:var(--radius-sm);
    cursor:pointer;
    transition:border-color .15s,background .15s;
  }
  .project-row:hover{border-color:var(--accent);background:#2c2d35;}
  .project-row.current{border-color:var(--accent);background:rgba(91,141,239,.08);}
  .project-row-main{flex:1;min-width:0;}
  .project-row-name{font-size:13.5px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .project-row-meta{font-size:11px;color:var(--text-faint);margin-top:2px;}
  .project-row-actions{display:flex;gap:4px;flex:none;}
  .project-action-btn{
    width:28px;height:28px;
    display:flex;align-items:center;justify-content:center;
    background:transparent;border:none;border-radius:6px;
    color:var(--text-faint);cursor:pointer;
  }
  .project-action-btn:hover{background:var(--panel);color:var(--text);}
  .project-action-btn.danger:hover{color:var(--danger);}
  .project-action-btn svg{width:15px;height:15px;}

  /* ===== DRAWER MENU PRINCIPAL ===== */
  .main-menu-drawer{ width:min(300px, 88vw); }
  .main-menu-body{
    flex:1;overflow-y:auto;
    padding:10px 14px 18px;
  }
  .menu-section{ margin-top:18px; }
  .menu-section:first-child{ margin-top:8px; }
  .menu-section-title{
    font-size:11px;font-weight:700;color:var(--text-faint);
    text-transform:uppercase;letter-spacing:.05em;
    padding:0 10px 8px;
  }
  .menu-item{
    width:100%;
    display:flex;align-items:center;gap:12px;
    padding:11px 12px;
    background:transparent;
    border:none;border-radius:var(--radius-sm);
    color:var(--text);
    font-size:14px;font-weight:500;
    text-align:left;
    cursor:pointer;
    transition:background .15s;
  }
  .menu-item:hover{ background:var(--panel-2); }
  .menu-item:active{ background:var(--panel-2); }
  .menu-item svg{ width:18px;height:18px;flex:none;color:var(--text-dim); }

  /* ===== POPOVER GENÉRICO (usado pelo menu de Exportar) ===== */
  .color-popover{
    position:fixed;
    background:var(--panel);
    border:1px solid var(--border-light);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:14px;
    width:240px;
    z-index:600;
    display:none;
  }
  .color-popover.open{display:block;}
  .export-menu-popover{width:260px;}

  /* ===== DRAWER DE CORES ===== */
  .color-drawer{ width:min(420px, 92vw); }
  .color-drawer-body{
    flex:1;overflow-y:auto;
    padding:16px 18px 24px;
  }
  .color-section{ margin-bottom:26px; }
  .color-section-title{
    font-size:12px;font-weight:700;color:var(--text-dim);
    text-transform:uppercase;letter-spacing:.04em;
    margin-bottom:10px;
  }
  .color-section-title-row{
    display:flex;align-items:center;justify-content:space-between;
    margin-bottom:10px;
  }
  .color-section-title-row .color-section-title{ margin-bottom:0; }
  .color-pop-row{display:flex;gap:6px;flex-wrap:wrap;}
  .color-level-btn{
    width:32px;height:32px;border-radius:8px;
    border:1px solid var(--border-light);
    background:var(--panel-2);color:var(--text-dim);
    font-size:13px;font-weight:600;cursor:pointer;
  }
  .color-level-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}

  .root-color-row{
    display:flex;align-items:center;gap:10px;
  }
  .color-swatch-input{
    width:38px;height:38px;
    border:1px solid var(--border-light);
    border-radius:8px;
    padding:0;background:none;cursor:pointer;
    flex:none;
  }
  .color-hex-input{
    flex:1;
    background:var(--panel-2);
    border:1px solid var(--border-light);
    border-radius:6px;
    padding:8px 10px;
    color:var(--text);
    font-size:13px;font-family:ui-monospace,monospace;
    text-transform:lowercase;
  }
  .color-hex-input:focus{outline:none;border-color:var(--accent);}
  .color-reset-btn, .color-add-btn{
    width:34px;height:34px;flex:none;
    display:flex;align-items:center;justify-content:center;
    background:var(--panel-2);
    border:1px solid var(--border-light);
    border-radius:6px;
    color:var(--text-dim);cursor:pointer;
  }
  .color-reset-btn:hover, .color-add-btn:hover{background:var(--panel);color:var(--text);}
  .color-reset-btn svg, .color-add-btn svg{width:15px;height:15px;}

  .color-palette-list{
    display:flex;flex-direction:column;gap:6px;
  }
  .color-palette-row{
    display:flex;align-items:center;gap:8px;
    padding:6px 8px;
    background:var(--panel-2);
    border:1px solid var(--border);
    border-radius:8px;
  }
  .color-palette-idx{
    font-size:11px;color:var(--text-faint);
    width:18px;flex:none;text-align:center;
  }
  .color-palette-swatch{
    width:28px;height:28px;flex:none;
    border-radius:6px;
    border:1px solid var(--border-light);
    cursor:pointer;
    padding:0;
  }
  .color-palette-hex{
    flex:1;min-width:0;
    background:transparent;
    border:none;
    color:var(--text);
    font-size:12.5px;font-family:ui-monospace,monospace;
    text-transform:lowercase;
  }
  .color-palette-hex:focus{outline:none;}
  .color-palette-actions{
    display:flex;gap:2px;flex:none;
  }
  .color-palette-action-btn{
    width:26px;height:26px;
    display:flex;align-items:center;justify-content:center;
    background:transparent;border:none;border-radius:5px;
    color:var(--text-faint);cursor:pointer;
  }
  .color-palette-action-btn:hover{background:var(--panel);color:var(--text);}
  .color-palette-action-btn.danger:hover{color:var(--danger, #e5484d);}
  .color-palette-action-btn svg{width:14px;height:14px;}

  #search-bar.mobile-open{ display:block; }
  #project-name-bar{ max-width:62vw; }
</style>
</head>
<body>

<div id="topbar">
  <div class="brand"><span class="dot"></span><span class="full">MindTree</span></div>

  <div id="mode-toggle">
    <button id="mode-edit-btn" class="active" data-mode="edit">Editar</button>
    <button id="mode-view-btn" data-mode="view">Visualizar</button>
  </div>

  <div class="tb-spacer"></div>

  <button class="tb-btn icon-only" id="btn-theme" title="Alternar tema">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="theme-icon"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg>
  </button>
</div>

<div id="project-name-bar">
  <span id="project-name-text">Sem título</span>
  <span id="project-name-unsaved" title="Alterações não salvas">●</span>
</div>

<div id="save-toast"></div>

<div id="canvas-wrap">
  <div id="canvas-inner">
    <svg id="tree-svg" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
</div>

<button id="search-toggle-btn" title="Buscar">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
</button>

<button id="btn-menu" title="Menu">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
</button>

<div id="search-bar">
  <div id="search-input-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
    <input type="text" id="search-input" placeholder="Buscar por nome..." autocomplete="off" />
    <div id="search-nav" style="display:none">
      <span id="search-count"></span>
      <button class="search-nav-btn" id="search-prev" title="Anterior">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <button class="search-nav-btn" id="search-next" title="Próximo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
      </button>
    </div>
    <button class="search-clear-btn" id="search-clear" title="Limpar" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
  </div>
  <div id="search-preview" style="display:none">
    <span id="search-preview-name"></span>
    <span id="search-preview-count"></span>
  </div>
</div>

<div id="zoom-controls">
  <button class="zoom-btn" id="zoom-in" title="Aumentar zoom">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
  </button>
  <div class="zoom-divider"></div>
  <button class="zoom-btn" id="zoom-out" title="Diminuir zoom">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/></svg>
  </button>
  <div class="zoom-divider"></div>
  <button class="zoom-btn" id="zoom-fit" title="Ajustar à tela">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3M16 3h3a2 2 0 0 1 2 2v3M21 16v3a2 2 0 0 1-2 2h-3M8 21H5a2 2 0 0 1-2-2v-3"/></svg>
  </button>
  <div id="zoom-pct">100%</div>
</div>

<div id="level-controls">
  <button class="level-btn" id="level-collapse-all" title="Fechar todos os níveis">
    <span class="level-glyph">⏮</span>
  </button>
  <button class="level-btn" id="level-collapse-one" title="Fechar o último nível aberto">
    <span class="level-glyph">⏪</span>
  </button>
  <button class="level-btn" id="level-expand-level" title="Explorar próximo nó">
    <span class="level-glyph">▶</span>
  </button>
  <button class="level-btn" id="level-expand-one" title="Abrir o próximo nível (toda a árvore)">
    <span class="level-glyph">⏩</span>
  </button>
  <button class="level-btn" id="level-expand-all" title="Abrir todos os níveis">
    <span class="level-glyph">⏭</span>
  </button>
</div>

<div id="empty-hint">A árvore está vazia. Use o botão de mais para começar.</div>

<!-- ===== DRAWER PLANILHA ===== -->

<div id="sheet-overlay" class="sheet-overlay"></div>
<div id="sheet-drawer" class="sheet-drawer">
  <div class="sheet-head">
    <span>Planilha</span>
    <button class="mt-x" id="sheet-close">&times;</button>
  </div>
  <div class="sheet-toolbar">
    <span id="sheet-info" class="sheet-info"></span>
  </div>
  <div class="sheet-table-wrap">
    <table id="sheet-table"></table>
  </div>
</div>

<!-- ===== DRAWER ESTILO ===== -->

<div id="style-overlay" class="sheet-overlay"></div>
<div id="style-drawer" class="sheet-drawer style-drawer drawer-left">
  <div class="sheet-head">
    <span>Estilo</span>
    <button class="mt-x" id="style-close">&times;</button>
  </div>
  <div class="style-body">

    <div class="style-section">
      <div class="style-section-title">Formato do container</div>
      <div class="style-options">
        <button class="style-option-btn" data-shape="capsule">
          <svg viewBox="0 0 64 28"><rect x="2" y="2" width="60" height="24" rx="12"/></svg>
          <span>Cápsula</span>
        </button>
        <button class="style-option-btn" data-shape="rect">
          <svg viewBox="0 0 64 28"><rect x="2" y="2" width="60" height="24" rx="0"/></svg>
          <span>Retângulo</span>
        </button>
        <button class="style-option-btn" data-shape="rounded">
          <svg viewBox="0 0 64 28"><rect x="2" y="2" width="60" height="24" rx="6"/></svg>
          <span>Cantos arred.</span>
        </button>
      </div>
    </div>

    <div class="style-section">
      <div class="style-section-title">Altura do container</div>
      <div class="style-options">
        <button class="style-option-btn" data-height="max">
          <svg viewBox="0 0 64 28"><rect x="6" y="2" width="52" height="24" rx="4"/></svg>
          <span>Máxima</span>
        </button>
        <button class="style-option-btn" data-height="min">
          <svg viewBox="0 0 64 28"><rect x="6" y="10" width="52" height="8" rx="4"/></svg>
          <span>Mínima</span>
        </button>
      </div>
    </div>

    <div class="style-section">
      <div class="style-section-title">Linhas de conexão</div>
      <div class="style-options">
        <button class="style-option-btn" data-line="smooth">
          <svg viewBox="0 0 64 28"><path d="M4,22 C30,22 30,6 60,6"/></svg>
          <span>Suave</span>
        </button>
        <button class="style-option-btn" data-line="straight">
          <svg viewBox="0 0 64 28"><path d="M4,22 H32 V6 H60"/></svg>
          <span>Reto</span>
        </button>
        <button class="style-option-btn" data-line="rounded">
          <svg viewBox="0 0 64 28"><path d="M4,22 H26 Q32,22 32,16 V12 Q32,6 38,6 H60"/></svg>
          <span>Arredondado</span>
        </button>
        <button class="style-option-btn" data-line="orthogonal">
          <svg viewBox="0 0 64 28"><path d="M4,22 H32 V12 Q32,6 38,6 H60"/></svg>
          <span>Ortogonal</span>
        </button>
      </div>
    </div>

  </div>
</div>

<!-- ===== DRAWER PROJETOS ===== -->

<div id="projects-overlay" class="sheet-overlay"></div>
<div id="projects-drawer" class="sheet-drawer projects-drawer drawer-left">
  <div class="sheet-head">
    <span>Projetos</span>
    <button class="mt-x" id="projects-close">&times;</button>
  </div>
  <div class="projects-toolbar projects-toolbar-top">
    <button class="tb-btn has-label" id="btn-new-project" style="width:100%;justify-content:center;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
      <span class="label">Novo projeto</span>
    </button>
  </div>
  <div class="projects-list" id="projects-list">
    <div class="projects-empty">Nenhum projeto salvo ainda.</div>
  </div>
