        let node = nodeCache[pathKey];
        if (!node) {
          node = TreeModel.createNode(val, '');
          parent.children.push(node);
          nodeCache[pathKey] = node;
        }
        parent = node;
      }
      // o texto da linha (se houver) vai pro nó FOLHA (último valor preenchido)
      if (text && parent !== root) {
        parent.text = text;
      }
    });

    return { root, shifted: !singleRootValue };
  }

  function parseCSVText(text){
    const lines = text.split(/\r\n|\n/).filter(l => l.length);
    const rows = lines.map(line => {
      const cells = [];
      let cur = '', inQuotes = false;
      for (let i = 0; i < line.length; i++){
        const ch = line[i];
        if (inQuotes){
          if (ch === '"' && line[i+1] === '"'){ cur += '"'; i++; }
          else if (ch === '"'){ inQuotes = false; }
          else cur += ch;
        } else {
          if (ch === '"') inQuotes = true;
          else if (ch === ','){ cells.push(cur); cur = ''; }
          else cur += ch;
        }
      }
      cells.push(cur);
      return cells;
    });
    return rows;
  }

  function importFromMatrix(matrix){
    if (!matrix.length) return;
    const header = matrix[0];
    const body = matrix.slice(1);
    // identifica quantas colunas são "níveis" (até achar Texto/Origem ou heuristicamente)
    let levelColCount = header.length;
    const textIdx = header.findIndex(h => /texto/i.test(String(h)));
    const origemIdx = header.findIndex(h => /origem/i.test(String(h)));
    if (textIdx > -1) levelColCount = textIdx;
    else if (origemIdx > -1) levelColCount = origemIdx;

    const bodyFiltered = body.filter(r => r.some(c => c && String(c).trim() !== ''));

    let newRoot;
    let columnShift = 0; // quantas posições os nomes de coluna devem deslocar (raiz extra criada)
    if (looksLikeCombinedFields(header, bodyFiltered, levelColCount)) {
      // formato de "campos combinados" — tabela tradicional com valores repetidos
      const result = importCombinedFields(header, bodyFiltered, levelColCount, textIdx);
      newRoot = result.root;
      // se uma raiz "Novo projeto" extra foi criada (1ª coluna tinha vários valores
      // distintos), os nomes de coluna capturados do cabeçalho original devem
      // ocupar a partir do Nível 2, não do Nível 1
      columnShift = result.shifted ? 1 : 0;
    } else {
      // formato nativo da ferramenta — uma coluna preenchida por linha
      const rows = bodyFiltered.map(r => ({
        cells: r.slice(0, levelColCount),
        text: textIdx > -1 ? r[textIdx] : ''
      }));
      newRoot = rowsToTree(rows);
    }

    // captura os nomes de cabeçalho das colunas de nível (se diferentes do padrão
    // "Nível N"), pra manter o nome customizado também depois de importar
    const capturedNames = [];
    for (let i = 0; i < levelColCount + columnShift; i++){
      const sourceIdx = i - columnShift;
      const h = sourceIdx >= 0 ? String(header[sourceIdx] ?? '').trim() : '';
      capturedNames.push(h || '');
    }
    AppState.columnNames = capturedNames;

    // expande TODA a árvore recém-importada — sem isso, tudo fica colapsado
    // e a pessoa vê só a raiz na tela, parecendo que a importação falhou
    expandAll(newRoot);

    TreeModel.setRoot(newRoot);
    AppState.focusedNodeId = null;
    Renderer.render();
    requestAnimationFrame(() => Renderer.fitToScreen());
    SheetPanel.refresh();
  }

  function expandAll(node){
    node.collapsed = false;
    (node.children || []).forEach(expandAll);
  }

  function importCSV(file){
    const reader = new FileReader();
    reader.onload = (e) => {
      const matrix = parseCSVText(e.target.result);
      importFromMatrix(matrix);
    };
    reader.readAsText(file, 'utf-8');
  }

  async function importXLSX(file){
    await ensureXLSX();
    const reader = new FileReader();
    reader.onload = (e) => {
      const wb = XLSX.read(e.target.result, { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const matrix = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
      importFromMatrix(matrix);
    };
    reader.readAsArrayBuffer(file);
  }

  function importHTML(file){
    const reader = new FileReader();
    reader.onload = (e) => {
      const text = e.target.result;
      const match = text.match(/<script type="application\/json" id="mindtree-data">([\s\S]*?)<\/script>/);
      if (!match) {
        alert('Este arquivo HTML não foi gerado pelo MindTree (estrutura de dados não encontrada).');
        return;
      }
      try {
        const data = JSON.parse(match[1]);
        TreeModel.setRoot(data);
        AppState.focusedNodeId = null;

        // recupera os estilos salvos junto na exportação (formato do
        // container, altura, tipo de linha, níveis de cor, nomes de coluna)
        // — sem isso, importar um HTML exportado perdia as configurações
        // visuais e voltava tudo pro padrão.
        const styleMatch = text.match(/<script type="application\/json" id="mindtree-style">([\s\S]*?)<\/script>/);
        if (styleMatch) {
          try {
            const style = JSON.parse(styleMatch[1]);
            if (typeof style.colorLevels === 'number') AppState.colorLevels = style.colorLevels;
            if (style.containerShape) AppState.containerShape = style.containerShape;
            if (style.containerHeight) AppState.containerHeight = style.containerHeight;
            if (style.lineStyle) AppState.lineStyle = style.lineStyle;
            if (Array.isArray(style.columnNames)) AppState.columnNames = style.columnNames;
            if (Array.isArray(style.customPalette) && style.customPalette.length) AppState.customPalette = style.customPalette;
            if (style.rootColor) AppState.rootColor = style.rootColor;
          } catch (styleErr) {
            // arquivo antigo, exportado antes dessa funcionalidade — segue
            // sem aplicar estilo customizado, sem quebrar a importação
          }
        }

        Renderer.render();
        requestAnimationFrame(() => Renderer.fitToScreen());
        SheetPanel.refresh();
      } catch (err) {
        alert('Não foi possível ler os dados deste arquivo HTML.');
      }
    };
    reader.readAsText(file, 'utf-8');
  }

  function handleFile(file){
    const name = file.name.toLowerCase();
    if (name.endsWith('.csv')) importCSV(file);
    else if (name.endsWith('.xlsx') || name.endsWith('.xls')) importXLSX(file);
    else if (name.endsWith('.html') || name.endsWith('.htm')) importHTML(file);
    else alert('Formato não suportado. Use .csv, .xlsx ou .html');
  }

  return { exportCSV, exportXLSX, exportHTML, exportCombinedCSV, exportCombinedXLSX, handleFile };
})();

/* =========================================================
   POPOVER DE EXPORTAÇÃO (escolher formato)
   ========================================================= */
const ExportMenu = (() => {
  let menu = null;
  function build(){
    menu = document.createElement('div');
    menu.className = 'color-popover export-menu-popover';
    menu.id = 'export-menu';
    menu.innerHTML = `
      <div class="color-pop-head">Formato nativo (níveis)</div>
      <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:14px;">
        <button class="mt-btn" data-fmt="csv" style="width:100%;justify-content:flex-start;text-align:left;">CSV (planilha)</button>
        <button class="mt-btn" data-fmt="xlsx" style="width:100%;justify-content:flex-start;text-align:left;">Excel (.xlsx)</button>
        <button class="mt-btn" data-fmt="html" style="width:100%;justify-content:flex-start;text-align:left;">HTML (apresentação)</button>
      </div>
      <div class="color-pop-head">Campos combinados (tabela)</div>
      <div style="display:flex;flex-direction:column;gap:6px;">
        <button class="mt-btn" data-fmt="combined-csv" style="width:100%;justify-content:flex-start;text-align:left;">CSV (planilha)</button>
        <button class="mt-btn" data-fmt="combined-xlsx" style="width:100%;justify-content:flex-start;text-align:left;">Excel (.xlsx)</button>
      </div>
    `;
    document.body.appendChild(menu);
    menu.addEventListener('click', (ev) => {
      const fmt = ev.target.dataset.fmt;
      if (!fmt) return;
      if (fmt === 'csv') ImportExport.exportCSV();
      else if (fmt === 'xlsx') ImportExport.exportXLSX();
      else if (fmt === 'html') ImportExport.exportHTML();
      else if (fmt === 'combined-csv') ImportExport.exportCombinedCSV();
      else if (fmt === 'combined-xlsx') ImportExport.exportCombinedXLSX();
      close();
    });
  }
  function open(btn){
    if (!menu) build();
    const rect = btn.getBoundingClientRect();
    menu.classList.add('open'); // precisa estar visível pra medir a altura real
    const menuHeight = menu.offsetHeight;
    const spaceBelow = window.innerHeight - rect.bottom;
    if (spaceBelow < menuHeight + 16 && rect.top > menuHeight + 16) {
      menu.style.top = (rect.top - menuHeight - 8) + 'px';
    } else {
      menu.style.top = (rect.bottom + 8) + 'px';
    }
    menu.style.left = Math.max(8, rect.left) + 'px';
  }
  function close(){ if (menu) menu.classList.remove('open'); }
  function toggle(btn){
    if (menu && menu.classList.contains('open')) close();
    else open(btn);
  }
  document.addEventListener('click', (ev) => {
    const anchorBtn = document.getElementById('btn-menu');
    if (menu && !menu.contains(ev.target) && ev.target !== anchorBtn && !(anchorBtn && anchorBtn.contains(ev.target))){
      close();
    }
  });
  return { toggle };
})();

/* =========================================================
   GERENCIADOR DE TEMA (claro/escuro)
   ========================================================= */
const ThemeManager = (() => {
  const STORAGE_KEY = 'mindtree-theme';
  const iconSun = '<circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/>';
  const iconMoon = '<path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/>';

  function getStored(){
    try { return localStorage.getItem(STORAGE_KEY); } catch(e){ return null; }
  }
  function setStored(value){
    try { localStorage.setItem(STORAGE_KEY, value); } catch(e){}
  }

  function apply(theme){
    document.documentElement.setAttribute('data-theme', theme);
    const icon = document.getElementById('theme-icon');
    if (icon) icon.innerHTML = theme === 'dark' ? iconMoon : iconSun;
    Renderer.render();
  }

  function toggle(){
    const current = document.documentElement.getAttribute('data-theme') ||
      (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    const next = current === 'dark' ? 'light' : 'dark';
    setStored(next);
    apply(next);
  }

  function init(){
    const stored = getStored();
    const theme = stored || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    apply(theme);
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (ev) => {
      if (!getStored()) apply(ev.matches ? 'dark' : 'light');
    });
  }

  return { toggle, init };
})();

/* =========================================================
   MODO EDIÇÃO / VISUALIZAÇÃO

function setMode(mode){
  AppState.mode = mode;
  document.getElementById('mode-edit-btn').classList.toggle('active', mode === 'edit');
  document.getElementById('mode-view-btn').classList.toggle('active', mode === 'view');
  Renderer.render();
}

/* =========================================================
   BOOTSTRAP — liga eventos do topbar e inicializa
   ========================================================= */
/* =========================================================
   BUSCA — filtra nós por nome, navega entre resultados
   ========================================================= */
const SearchManager = (() => {
  const input = document.getElementById('search-input');
  const navWrap = document.getElementById('search-nav');
  const countEl = document.getElementById('search-count');
  const clearBtn = document.getElementById('search-clear');
  const prevBtn = document.getElementById('search-prev');
  const nextBtn = document.getElementById('search-next');
  const previewWrap = document.getElementById('search-preview');
  const previewName = document.getElementById('search-preview-name');
  const previewCount = document.getElementById('search-preview-count');
  const searchBar = document.getElementById('search-bar');
  const toggleBtn = document.getElementById('search-toggle-btn');

  let matches = [];   // lista de ids de nós que batem com a busca (na ordem da árvore)
  let currentIdx = -1;

  function collectAllNodes(node, acc){
    acc = acc || [];
    acc.push(node);
    (node.children || []).forEach(c => collectAllNodes(c, acc));
    return acc;
  }

  function expandAncestorsOf(nodeId){
    // garante que todo ancestral do nó encontrado esteja expandido,
    // senão o nó buscado fica escondido (collapsed) e não aparece na tela
    let parent = TreeModel.findParent(nodeId);
    while (parent) {
      if (parent.collapsed) TreeModel.updateNode(parent.id, { collapsed: false });
      parent = TreeModel.findParent(parent.id);
    }
  }

  function hidePreview(){
    previewWrap.style.display = 'none';
  }

  function runSearch(term){
    clearHighlights();
    term = term.trim().toLowerCase();
    if (!term) {
      matches = [];
      currentIdx = -1;
      navWrap.style.display = 'none';
      clearBtn.style.display = 'none';
      hidePreview();
      return;
    }

    const all = collectAllNodes(TreeModel.getRoot());
    matches = all.filter(n => (n.name || '').toLowerCase().includes(term)).map(n => n.id);

    clearBtn.style.display = 'flex';
    if (!matches.length) {
      navWrap.style.display = 'none';
      countEl.textContent = '0/0';
      hidePreview();
      return;
    }

    navWrap.style.display = 'flex';
    currentIdx = 0;
    matches.forEach(id => expandAncestorsOf(id));
    Renderer.render();
    requestAnimationFrame(() => {
      highlightMatches();
      goToCurrent();
    });
  }

  function highlightMatches(){
    document.querySelectorAll('.capsule-rect').forEach(rect => {
      rect.classList.remove('search-match', 'search-current');
    });
    matches.forEach((id, i) => {
      const wrapper = findCapsuleRectByNodeId(id);
      if (wrapper) wrapper.classList.add(i === currentIdx ? 'search-current' : 'search-match');
    });
  }

  function findCapsuleRectByNodeId(id){
    const wrapper = document.querySelector(`.node-wrapper[data-node-id="${id}"]`);
    return wrapper ? wrapper.querySelector('.capsule-rect') : null;
  }

  function clearHighlights(){
    document.querySelectorAll('.capsule-rect').forEach(rect => {
      rect.classList.remove('search-match', 'search-current');
    });
  }

  function goToCurrent(){
    if (currentIdx < 0 || currentIdx >= matches.length) { hidePreview(); return; }
    const id = matches[currentIdx];
    countEl.textContent = `${currentIdx + 1}/${matches.length}`;
    AppState.focusedNodeId = id;
    const parentId = TreeModel.findParent(id)?.id;
    Renderer.focusOn(parentId ? [parentId, id] : [id]);
    highlightMatches();

    // preview imediato: nome do nó encontrado + contagem, centralizado
    // logo abaixo da caixa de busca, pra confirmação visual sem precisar
    // procurar o destaque na árvore
    const node = TreeModel.findNode(id);
    previewName.textContent = node ? (node.name || 'Sem título') : '';
    previewCount.textContent = `${currentIdx + 1}/${matches.length}`;
    previewWrap.style.display = 'flex';
  }

  function next(){
    if (!matches.length) return;
    currentIdx = (currentIdx + 1) % matches.length;
    goToCurrent();
  }

  function prev(){
    if (!matches.length) return;
    currentIdx = (currentIdx - 1 + matches.length) % matches.length;
    goToCurrent();
  }

  function clear(){
    input.value = '';
    matches = [];
    currentIdx = -1;
    navWrap.style.display = 'none';
    clearBtn.style.display = 'none';
    clearHighlights();
    hidePreview();
    input.blur();
    closeMobileBar();
  }

  // ---- comportamento mobile: barra de busca some por trás de um botão de
  // lupa em telas pequenas, pra não tampar a árvore — toca a lupa pra abrir,
  // toca de novo (ou limpa a busca) pra fechar e liberar o espaço de novo
  function openMobileBar(){
    searchBar.classList.add('mobile-open');
    input.focus();
  }
  function closeMobileBar(){
    searchBar.classList.remove('mobile-open');
  }
  function toggleMobileBar(){
    if (searchBar.classList.contains('mobile-open')) closeMobileBar();
    else openMobileBar();
  }

  let debounceTimer = null;
  function init(){
    input.addEventListener('input', () => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => runSearch(input.value), 200);
    });
    input.addEventListener('keydown', (ev) => {
      if (ev.key === 'Enter') { ev.shiftKey ? prev() : next(); }
      if (ev.key === 'Escape') clear();
    });
    nextBtn.addEventListener('click', next);
    prevBtn.addEventListener('click', prev);
    clearBtn.addEventListener('click', clear);
    toggleBtn.addEventListener('click', toggleMobileBar);
  }

  return { init, clearHighlights, highlightMatches };
})();

function bootstrap(){
  ThemeManager.init();
  SearchManager.init();

  document.getElementById('mode-edit-btn').addEventListener('click', () => setMode('edit'));
  document.getElementById('mode-view-btn').addEventListener('click', () => setMode('view'));

  document.getElementById('btn-theme').addEventListener('click', () => ThemeManager.toggle());

  // ---- menu principal (drawer com Cores, Planilha, Estilo, Importar, Exportar, Projetos, Reiniciar) ----
  const mainMenuDrawer = document.getElementById('main-menu-drawer');
  const mainMenuOverlay = document.getElementById('main-menu-overlay');
  function openMainMenu(){
    mainMenuDrawer.classList.add('open');
    mainMenuOverlay.classList.add('open');
  }
  function closeMainMenu(){
    mainMenuDrawer.classList.remove('open');
    mainMenuOverlay.classList.remove('open');
  }
  document.getElementById('btn-menu').addEventListener('click', openMainMenu);
  document.getElementById('main-menu-close').addEventListener('click', closeMainMenu);
  mainMenuOverlay.addEventListener('click', closeMainMenu);

  document.getElementById('menu-btn-colors').addEventListener('click', () => {
    closeMainMenu();
    ColorSelector.open();
  });

  document.getElementById('menu-btn-sheet').addEventListener('click', () => {
    closeMainMenu();
    SheetPanel.open();
  });
  document.getElementById('menu-btn-style').addEventListener('click', () => {
    closeMainMenu();
    StylePanel.open();
  });
  document.getElementById('menu-btn-projects').addEventListener('click', () => {
    closeMainMenu();
    ProjectManager.open();
  });

  document.getElementById('menu-btn-export').addEventListener('click', (ev) => {
    ev.stopPropagation();
    closeMainMenu();
    ExportMenu.toggle(document.getElementById('btn-menu'));
  });

  const fileInput = document.getElementById('file-input');
  document.getElementById('menu-btn-import').addEventListener('click', () => {
    closeMainMenu();
    fileInput.click();
  });
  fileInput.addEventListener('change', (ev) => {
    const file = ev.target.files[0];
    if (file) ImportExport.handleFile(file);
    fileInput.value = '';
  });

  document.getElementById('menu-btn-reset').addEventListener('click', () => {
    closeMainMenu();
    ProjectManager.startNewProject();
  });

  // ---- zoom / pan / fit ----
  document.getElementById('zoom-in').addEventListener('click', () => Renderer.zoomBy(1.3));
  document.getElementById('zoom-out').addEventListener('click', () => Renderer.zoomBy(1 / 1.3));
  document.getElementById('zoom-fit').addEventListener('click', () => Renderer.fitToScreen());

  // ---- controles de nível global (abrir/fechar por camada, por nó, ou tudo de uma vez) ----
  document.getElementById('level-expand-level').addEventListener('click', () => {
    TreeModel.expandNextNode();
    Renderer.render();
    SheetPanel.refresh();
  });
  document.getElementById('level-expand-one').addEventListener('click', () => {
    TreeModel.expandNextLevel();
    Renderer.render();
    SheetPanel.refresh();
  });
  document.getElementById('level-collapse-one').addEventListener('click', () => {
    TreeModel.collapseLastLevel();
    Renderer.render();
    SheetPanel.refresh();
  });
  document.getElementById('level-expand-all').addEventListener('click', () => {
    TreeModel.expandAllLevels();
    Renderer.render();
    SheetPanel.refresh();
  });
  document.getElementById('level-collapse-all').addEventListener('click', () => {
    TreeModel.collapseAllLevels();
    Renderer.render();
    SheetPanel.refresh();
  });

  // clique no nó raiz pra editar nome inicial, se ainda vazio
  window.addEventListener('resize', () => Renderer.render());

  Renderer.render();
  requestAnimationFrame(() => Renderer.fitToScreen());
  ProjectNameBar.markClean(); // estado inicial: nada editado ainda, nada pra salvar
  ProjectNameBar.refresh();

  // ao abrir o aplicativo, mostra a lista de projetos — assim a pessoa pode
  // escolher continuar um projeto já salvo ou criar um novo, em vez de cair
  // direto na edição do nome do projeto novo
  setTimeout(() => ProjectManager.open(), 300);
}

document.addEventListener('DOMContentLoaded', bootstrap);

// ===== PWA: registra o service worker (suporte offline + instalação) =====
// roda só em produção servida via http(s) — service workers não funcionam
// em arquivos abertos direto (file://), então a ferramenta continua
// funcionando normalmente nesse modo, só sem o recurso offline
if ('serviceWorker' in navigator && (location.protocol === 'http:' || location.protocol === 'https:')) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {
      // falha silenciosa: app continua funcionando normalmente sem cache offline
    });
  });
}
