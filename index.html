<script>
console.log('MindTree base carregado. D3 versão:', d3.version);

/* =========================================================
   MODELO DE DADOS
   Cada nó: { id, name, text, children: [], collapsed: bool }
   ========================================================= */
const TreeModel = (() => {
  let nextId = 1;
  const genId = () => 'n' + (nextId++);

  function createNode(name = '', text = '') {
    return { id: genId(), name, text, children: [], collapsed: true };
  }

  // raiz inicial
  let root = createNode('Novo projeto', '');

  function getRoot(){ return root; }

  function setRoot(newRoot){
    root = newRoot;
    // recalibra nextId pra não colidir em importações
    let maxNum = 0;
    (function walk(n){
      const m = /^n(\d+)$/.exec(n.id);
      if (m) maxNum = Math.max(maxNum, parseInt(m[1], 10));
      (n.children||[]).forEach(walk);
    })(root);
    nextId = maxNum + 1;
  }

  function findNode(id, node = root){
    if (node.id === id) return node;
    for (const c of node.children){
      const found = findNode(id, c);
      if (found) return found;
    }
    return null;
  }

  function findParent(id, node = root, parent = null){
    if (node.id === id) return parent;
    for (const c of node.children){
      const found = findParent(id, c, node);
      if (found !== undefined && found !== null) return found;
    }
    return null;
  }

  function addChild(parentId, name = '', text = ''){
    const parent = findNode(parentId);
    if (!parent) return null;
    const child = createNode(name, text);
    parent.children.push(child);
    return child;
  }

  function updateNode(id, fields){
    const node = findNode(id);
    if (!node) return false;
    Object.assign(node, fields);
    return true;
  }

  function removeNode(id){
    if (id === root.id) return false;
    const parent = findParent(id);
    if (!parent) return false;
    parent.children = parent.children.filter(c => c.id !== id);
    return true;
  }

  function toggleCollapsed(id){
    const node = findNode(id);
    if (!node) return;
    if (!node.collapsed) {
      // está ABERTO e vai FECHAR: reseta em cascata — todos os descendentes
      // voltam ao estado fechado, para que reabrir esse nó sempre mostre
      // só o próximo nível, do zero, sem "lembrar" de aberturas anteriores
      node.collapsed = true;
      collapseDescendants(node);
    } else {
      node.collapsed = false;
    }
  }

  function collapseDescendants(node){
    (node.children || []).forEach(c => {
      c.collapsed = true;
      collapseDescendants(c);
    });
  }

  // ---- controles de nível GLOBAL (toda a árvore de uma vez) ----

  function getMaxOpenDepth(node = root, depth = 0){
    // maior profundidade que está atualmente VISÍVEL (aberta) em qualquer ramo.
    // um nó conta como "aberto até aqui" se ele tem filhos E não está colapsado;
    // a profundidade dos próprios filhos (visíveis) é o que se acumula.
    if (node.collapsed || !node.children || !node.children.length) return depth;
    return Math.max(...node.children.map(c => getMaxOpenDepth(c, depth + 1)));
  }

  function flattenPreOrder(node = root, acc = []){
    // lista todos os nós da árvore em ordem de profundidade (pré-ordem),
    // SEM a raiz (ela já está sempre visível) — usado pela navegação ⏩
    (node.children || []).forEach(c => {
      acc.push(c);
      flattenPreOrder(c, acc);
    });
    return acc;
  }

  function expandNextNode(){
    // navegação sequencial em profundidade (DFS): a cada clique, SEMPRE
    // varre a árvore inteira DO INÍCIO (em ordem de pré-ordem) e abre o
    // PRIMEIRO nó que ainda está FECHADO e tem filhos pra revelar.
    //
    // Importante: não depende de um "ponteiro de última posição" — isso
    // evita que a navegação fique desatualizada quando o usuário mexe na
    // árvore manualmente por fora (clica em nós, importa nova árvore, etc).
    // Sempre reflete o estado real, garantindo que comece do topo e nunca
    // pule pra um ponto no meio sem ter passado pelos anteriores.
    const allNodes = flattenPreOrder();
    if (!allNodes.length) return;

    const target = allNodes.find(n => n.collapsed && n.children && n.children.length);
    if (!target) {
      // não há mais nenhum nó fechado com filhos — todo mundo já foi
      // expandido. Reinicia o ciclo: fecha tudo de volta ao estado inicial
      // (só a raiz visível) e abre o primeiro nó da árvore, recomeçando.
      collapseAllLevels();
      const restartTarget = allNodes.find(n => n.children && n.children.length);
      if (restartTarget) {
        restartTarget.collapsed = false;
        AppState.focusedNodeId = restartTarget.id;
      }
      return;
    }

    // garante que todos os ANCESTRAIS do alvo estejam abertos (senão ele
    // fica escondido e nunca aparece na tela, mesmo marcado como expandido)
    let parent = findParent(target.id);
    while (parent) {
      if (parent.collapsed) parent.collapsed = false;
      parent = findParent(parent.id);
    }
    // abre o próprio nó alvo
    target.collapsed = false;
    AppState.focusedNodeId = target.id;
  }

  function expandNextLevel(){
    // expande TODA A ÁRVORE por camada uniforme: olha a profundidade máxima
    // aberta atualmente em qualquer ramo e empurra essa fronteira em +1 de
    // uma vez. Ramos "atrasados" (que ainda não alcançaram a fronteira) são
    // alcançados primeiro, antes da fronteira avançar de fato.
    const maxDepth = getMaxOpenDepth();

    function hasLaggingClosed(node, depth){
      if (node.collapsed) return depth < maxDepth && node.children && node.children.length > 0;
      return (node.children || []).some(c => hasLaggingClosed(c, depth + 1));
    }
    const lagging = hasLaggingClosed(root, 0);

    function walk(node, depth){
      if (node.collapsed) {
        const targetDepth = lagging ? maxDepth - 1 : maxDepth;
        if (depth === targetDepth && node.children && node.children.length) {
          node.collapsed = false;
        }
        return;
      }
      (node.children || []).forEach(c => walk(c, depth + 1));
    }
    walk(root, 0);
  }

  function collapseLastLevel(){
    // colapsa todos os nós que estão na profundidade máxima ABERTA atual
    // (volta uma camada uniformemente). Se a árvore já está toda fechada
    // (maxDepth=0), não faz nada.
    const maxDepth = getMaxOpenDepth();
    if (maxDepth === 0) return;
    function walk(node, depth){
      if (depth === maxDepth - 1 && node.children && node.children.length && !node.collapsed) {
        node.collapsed = true;
        collapseDescendants(node);
        return;
      }
      (node.children || []).forEach(c => {
        if (!node.collapsed) walk(c, depth + 1);
      });
    }
    walk(root, 0);
  }

  function expandAllLevels(){
    function walk(node){
      if (node.children && node.children.length) node.collapsed = false;
      (node.children || []).forEach(walk);
    }
    walk(root);
  }

  function collapseAllLevels(){
    (root.children || []).forEach(c => {
      c.collapsed = true;
      collapseDescendants(c);
    });
  }

  function depthOf(id, node = root, d = 0){
    if (node.id === id) return d;
    for (const c of node.children){
      const found = depthOf(id, c, d + 1);
      if (found !== -1) return found;
    }
    return -1;
  }

  function nodeCount(node = root){
    return 1 + node.children.reduce((sum, c) => sum + nodeCount(c), 0);
  }

  function maxDepth(node = root, d = 0){
    if (!node.children.length) return d;
    return Math.max(...node.children.map(c => maxDepth(c, d + 1)));
  }

  return {
    getRoot, setRoot, createNode,
    findNode, findParent, addChild, updateNode, removeNode,
    toggleCollapsed, depthOf, nodeCount, maxDepth,
    getMaxOpenDepth, expandNextLevel, expandNextNode, collapseLastLevel, expandAllLevels, collapseAllLevels
  };
})();

/* =========================================================
   ESTADO GLOBAL DA UI
   ========================================================= */
const DEFAULT_PALETTE_HEX = [
  '#bc2424', '#bc5224', '#9a681d', '#6b6214', '#5a6b14',
  '#477817', '#2a7817', '#177821', '#17783e', '#17785b',
  '#177878', '#1d759a', '#1d4f9a', '#1d2a9a', '#361d9a',
  '#5c1d9a', '#811d9a', '#9a1d8e', '#9a1d68', '#9a1d43'
];
const DEFAULT_ROOT_COLOR = '#5a5b64';

const AppState = {
  mode: 'edit',            // 'edit' | 'view'
  colorLevels: 4,          // quantos níveis diferenciar cor
  focusedNodeId: null,     // último nó focado (clique)
  editingFieldId: null,    // id do nó cujo campo está aberto pra edição
  containerShape: 'capsule', // 'capsule' | 'rect' | 'rounded'
  containerHeight: 'max',    // 'max' | 'min'
  lineStyle: 'smooth',       // 'smooth' | 'straight' | 'rounded'
  columnNames: [],           // nomes customizados por nível/profundidade (índice 0 = nível 1).
                              // se vazio ou sem entrada pra um índice, usa "Nível N" como padrão
  customPalette: [...DEFAULT_PALETTE_HEX], // lista editável de cores hex (até 20), usada em sequência
  rootColor: DEFAULT_ROOT_COLOR,           // cor customizável específica para o nó raiz
};

function getColumnName(levelIndex1Based){
  const custom = AppState.columnNames[levelIndex1Based - 1];
  return (custom && custom.trim()) ? custom.trim() : ('Nível ' + levelIndex1Based);
}

/* =========================================================
   MOTOR DE RENDERIZAÇÃO (D3 tree layout, horizontal)
   ========================================================= */
const Renderer = (() => {
  const svg = d3.select('#tree-svg');
  const wrap = document.getElementById('canvas-wrap');
  const inner = document.getElementById('canvas-inner');

  // ---- ZOOM / PAN ----
  // o SVG agora tem tamanho FIXO (100% da viewport). Um <g class="zoom-layer">
  // interno recebe a transformação (translate+scale) calculada pelo d3.zoom.
  // Isso substitui o scroll nativo do navegador por um sistema de câmera
  // explícito, necessário para zoom de verdade (scroll do mouse, botões +/-,
  // ajustar à tela) e para pan com o botão do meio do mouse.
  const ZOOM_MIN = 0.15;
  const ZOOM_MAX = 2.5;
  let currentTransform = d3.zoomIdentity;

  const zoomLayer = svg.append('g').attr('class', 'zoom-layer');

  const zoomBehavior = d3.zoom()
    .scaleExtent([ZOOM_MIN, ZOOM_MAX])
    .filter((event) => {
      // botão esquerdo arrasta normalmente; botão do meio também aciona pan
      // (preventDefault evita o autoscroll nativo do navegador no middle-click)
      if (event.type === 'wheel') return true;
      if (event.type === 'mousedown') return event.button === 0 || event.button === 1;
      return !event.button;
    })
    .on('zoom', (event) => {
      currentTransform = event.transform;
      zoomLayer.attr('transform', currentTransform);
      updateZoomPct();
    })
    .on('start', (event) => {
      if (event.sourceEvent && event.sourceEvent.button === 1) {
        svg.classed('panning', true);
      }
    })
    .on('end', () => {
      svg.classed('panning', false);
    });

  svg.call(zoomBehavior).on('dblclick.zoom', null);

  // middle-click: evita o comportamento padrão do navegador (autoscroll icon)
  svg.node().addEventListener('mousedown', (ev) => {
    if (ev.button === 1) ev.preventDefault();
  });
  svg.node().addEventListener('auxclick', (ev) => {
    if (ev.button === 1) ev.preventDefault();
  });

  function updateZoomPct(){
    const el = document.getElementById('zoom-pct');
    if (el) el.textContent = Math.round(currentTransform.k * 100) + '%';
  }

  function zoomBy(factor){
    svg.transition().duration(200).call(zoomBehavior.scaleBy, factor);
  }

  function zoomTo(transform, duration){
    svg.transition().duration(duration ?? 400).call(zoomBehavior.transform, transform);
  }

  // dimensões — nó (círculo) compacto + cápsula curta, só pro título
  const CIRCLE_R = 9;        // raio do nó (círculo clicável que expande/colapsa)
  const CAPSULE_H_MAX = 36;  // altura máxima da cápsula (atual)
  const CAPSULE_H_MIN = 22;  // altura mínima — o menor possível pra caber o texto
  function getCapsuleH(){ return AppState.containerHeight === 'min' ? CAPSULE_H_MIN : CAPSULE_H_MAX; }

  function getContainerRadius(h){
    if (AppState.containerShape === 'rect') return 0;
    if (AppState.containerShape === 'rounded') return 6;
    return h / 2; // 'capsule' — totalmente arredondado
  }
  const CAPSULE_GAP = 14;    // distância entre o nó e a cápsula
  const MIN_CAPSULE_W = 70;
  const PAD_X = 14;          // padding horizontal interno do texto na cápsula
  const ROW_H = 46;          // altura reservada por linha (nó+cápsula+respiro)
  const LEVEL_GAP = 64;      // espaço horizontal entre níveis (nó até próximo nó)
  const PADDING = 90;        // margem ao redor de toda a árvore
  const CHAR_W = 7.6;        // largura aproximada por caractere (13px font)

  // paleta vibrante — pares [escuro, claro] por nível, ambos com bom contraste
  // calcula se o texto deve ser branco ou escuro sobre uma cor de fundo,
  // baseado em luminância relativa (WCAG) — garante legibilidade mesmo com
  // cores customizadas pelo usuário no painel de Cores
  function bestTextColor(hex){
    const h = hex.replace('#', '');
    const r = parseInt(h.substr(0, 2), 16) / 255;
    const g = parseInt(h.substr(2, 2), 16) / 255;
    const b = parseInt(h.substr(4, 2), 16) / 255;
    const lin = c => c <= 0.03928 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4);
    const luminance = 0.2126 * lin(r) + 0.7152 * lin(g) + 0.0722 * lin(b);
    const contrastWithWhite = (1.05) / (luminance + 0.05);
    return contrastWithWhite >= 3.2 ? '#ffffff' : '#1c1e22';
  }

  // levemente ajusta a cor pro tema claro (um pouco mais clara) sem mudar o
  // matiz, pra manter a identidade da cor escolhida pelo usuário nos dois temas
  function adjustForLightTheme(hex){
    const h = hex.replace('#', '');
    let r = parseInt(h.substr(0, 2), 16);
    let g = parseInt(h.substr(2, 2), 16);
    let b = parseInt(h.substr(4, 2), 16);
    const mix = (c) => Math.round(c + (255 - c) * 0.06);
    r = mix(r); g = mix(g); b = mix(b);
    return '#' + [r, g, b].map(c => c.toString(16).padStart(2, '0')).join('');
  }

  function colorPairFromHex(hex){
    const dark = hex;
    const light = adjustForLightTheme(hex);
    return {
      dark: { fill: dark, text: bestTextColor(dark) },
      light: { fill: light, text: bestTextColor(light) }
    };
  }

  const NEUTRAL = {
    dark:{ fill:'#5a5b64', text:'#f0f1f4' },
    light:{ fill:'#aeb2bb', text:'#1c1e22' }
  };

  function currentTheme(){
    const attr = document.documentElement.getAttribute('data-theme');
    if (attr === 'dark' || attr === 'light') return attr;
    return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  }

  // cor da RAIZ — usa AppState.rootColor (customizável), com texto calculado
  // automaticamente pra garantir contraste
  function rootColorPair(){
    const theme = currentTheme();
    const hex = AppState.rootColor || DEFAULT_ROOT_COLOR;
    return colorPairFromHex(hex)[theme];
  }

  // cor por ÍNDICE DE PALETA (não por profundidade absoluta) — permite herança do pai.
  // a paleta agora vem de AppState.customPalette (editável pelo usuário no painel de Cores)
  function colorByIndex(idx){
    const theme = currentTheme();
    if (idx === null || idx === undefined) return rootColorPair();
    const palette = (AppState.customPalette && AppState.customPalette.length) ? AppState.customPalette : DEFAULT_PALETTE_HEX;
    const hex = palette[idx % palette.length] || palette[0];
    return colorPairFromHex(hex)[theme];
  }

  function capsuleWidth(node){
    const nameLen = (node.name || 'Sem título').length;
    return Math.max(MIN_CAPSULE_W, Math.round(nameLen * CHAR_W) + PAD_X * 2);
  }

  function buildHierarchy(){
    const rootData = TreeModel.getRoot();
    const root = d3.hierarchy(rootData, d => d.collapsed ? null : d.children);

    // calcula o ÍNDICE DE COR de cada nó com base em RAMO (linhagem) + colorLevels.
    // raiz = cor customizável própria (AppState.rootColor). Dentro da "zona de
    // diferenciação" (profundidade <= AppState.colorLevels), cada NÓ recebe sua
    // PRÓPRIA cor — diferente da cor dos seus irmãos — e essa cor se propaga por
    // toda a sua descendência. Ou seja: com colorLevels=2, os filhos da raiz
    // (nível 1) se diferenciam entre si, e cada um desses ramos carrega sua cor
    // até o fim da árvore. A cor é amarrada à LINHAGEM (pai → filho), nunca à
    // coluna/profundidade absoluta.
    //
    // REGRA IMPORTANTE: um nó nunca pode ter a MESMA cor do seu pai direto —
    // isso evitaria dar a falsa impressão de que pai e filho fazem parte do
    // mesmo "grupo" quando, na verdade, são nós distintos. Se o próximo índice
    // da paleta coincidir com o do pai, pula pro seguinte automaticamente.
    const palette = (AppState.customPalette && AppState.customPalette.length) ? AppState.customPalette : DEFAULT_PALETTE_HEX;
    let paletteCounter = 0;
    root.each(d => {
      if (d.depth === 0) {
        d._colorIdx = null;
      } else if (d.depth <= AppState.colorLevels) {
        // nasce uma cor nova e própria para este nó (dentro da zona de diferenciação)
        let idx = paletteCounter % palette.length;
        const parentIdx = d.parent ? d.parent._colorIdx : null;
        if (parentIdx !== null && parentIdx !== undefined && idx === parentIdx && palette.length > 1) {
          idx = (idx + 1) % palette.length; // nunca repete a cor do pai direto
        }
        d._colorIdx = idx;
        paletteCounter++;
      } else {
        // além da zona: herda a cor do pai (continua o ramo)
        d._colorIdx = d.parent._colorIdx;
      }
      d._w = capsuleWidth(d.data);
    });

    return root;
  }

  function computeLayout(){
    const root = buildHierarchy();
    const treeLayout = d3.tree()
      .nodeSize([ROW_H, 0])
      .separation((a, b) => 1);
    treeLayout(root);

    // posição horizontal: cada nível avança capsula + gap + círculo + LEVEL_GAP
    const widthByDepth = {};
    root.each(d => {
      widthByDepth[d.depth] = Math.max(widthByDepth[d.depth] || 0, d._w || MIN_CAPSULE_W);
    });
    const xOffsetByDepth = {};
    let acc = 0;
    const maxDepth = Math.max(...root.descendants().map(d => d.depth));
    for (let depth = 0; depth <= maxDepth; depth++){
      xOffsetByDepth[depth] = acc;
      // espaço deste nível: círculo + gap + cápsula + gap até o próximo nível
      acc += CIRCLE_R * 2 + CAPSULE_GAP + (widthByDepth[depth] || MIN_CAPSULE_W) + LEVEL_GAP;
    }
    root.each(d => { d.y = xOffsetByDepth[d.depth]; });

    let minX = Infinity, maxX = -Infinity, maxY = -Infinity, maxNodeWAtMaxY = MIN_CAPSULE_W;
    root.each(d => {
      if (d.x < minX) minX = d.x;
      if (d.x > maxX) maxX = d.x;
      if (d.y > maxY) { maxY = d.y; maxNodeWAtMaxY = d._w || MIN_CAPSULE_W; }
    });
    const offsetX = PADDING - minX;
    root.each(d => { d.x += offsetX; d.y += PADDING; });

    const totalW = maxY + CIRCLE_R * 2 + CAPSULE_GAP + maxNodeWAtMaxY + PADDING;
    const totalH = (maxX - minX) + ROW_H + PADDING * 2;

    return { root, totalW, totalH };
  }

  let lastRoot = null;
  let previousRoot = null; // snapshot da árvore ANTES do render atual — usado
                            // como referência estável para nós que estão saindo
                            // (colapsando), já que lastRoot é sobrescrito antes
                            // de renderNodes rodar.

  function render(){
    const { root, totalW, totalH } = computeLayout();
    previousRoot = lastRoot;
    lastRoot = root;

    renderLinks(root);
    renderNodes(root);

    document.getElementById('empty-hint').style.display =
      TreeModel.nodeCount() <= 1 && !TreeModel.getRoot().name ? 'block' : 'none';

    if (typeof ProjectNameBar !== 'undefined') {
      ProjectNameBar.markDirty();
      ProjectNameBar.refresh();
    }
  }

  // ponto de conexão: sai do CÍRCULO do pai (que fica à direita da cápsula
  // do pai), entra na CÁPSULA do filho (lado esquerdo dela)
  function linkPathGen(d){
    const sourceW = d.source._w || MIN_CAPSULE_W;
    const sx = d.source.y + sourceW + CAPSULE_GAP + CIRCLE_R * 2, sy = d.source.x;
    const tx = d.target.y, ty = d.target.x;
    const style = AppState.lineStyle;

    if (style === 'straight') {
      // cotovelo em ângulo reto: horizontal -> vertical -> horizontal
      const mx = (sx + tx) / 2;
      return `M${sx},${sy} H${mx} V${ty} H${tx}`;
    }

    if (style === 'rounded') {
      // mesma rota do cotovelo, mas com cantos suavizados por arcos pequenos
      const mx = (sx + tx) / 2;
      const r = Math.min(14, Math.abs(ty - sy) / 2, Math.abs(mx - sx) / 2, Math.abs(tx - mx) / 2);
      if (r < 1 || sy === ty) {
        // sem desnível vertical (ou raio degenerado): linha reta direta
        return `M${sx},${sy} H${tx}`;
      }
      const goingDown = ty > sy;
      const sweep1 = goingDown ? 1 : 0;
      const sweep2 = goingDown ? 0 : 1;
      return `M${sx},${sy} H${mx - r} A${r},${r} 0 0 ${sweep1} ${mx},${sy + (goingDown ? r : -r)} V${ty - (goingDown ? r : -r)} A${r},${r} 0 0 ${sweep2} ${mx + r},${ty} H${tx}`;
    }

    if (style === 'orthogonal') {
      // híbrido: a PRIMEIRA dobra (saindo do pai, de horizontal pra vertical)
      // fica em ângulo reto puro — igual ao modelo "Reto". A SEGUNDA dobra
      // (chegando no filho, de vertical pra horizontal) fica arredondada —
      // igual ao modelo "Arredondado". Mistura visual entre os dois estilos.
      const mx = (sx + tx) / 2;
      const r = Math.min(14, Math.abs(ty - sy) / 2, Math.abs(tx - mx) / 2);
      if (r < 1 || sy === ty) {
        return `M${sx},${sy} H${tx}`;
      }
      const goingDown = ty > sy;
      const sweep2 = goingDown ? 0 : 1;
      return `M${sx},${sy} H${mx} V${ty - (goingDown ? r : -r)} A${r},${r} 0 0 ${sweep2} ${mx + r},${ty} H${tx}`;
    }

    // 'smooth' (padrão) — curva Bézier suave
    const mx = (sx + tx) / 2;
    return `M${sx},${sy} C${mx},${sy} ${mx},${ty} ${tx},${ty}`;
  }

  // duração de cada fase da animação de expandir/colapsar
  const ANIM_MS = 380;
  const ANIM_EASE = d3.easeCubicInOut;

  function renderLinks(root){
    const links = root.links();
    let g = zoomLayer.select('g.links-layer');
    if (g.empty()) g = zoomLayer.append('g').attr('class', 'links-layer');

    const sel = g.selectAll('path.link-path')
      .data(links, d => d.target.data.id);

    // saída: encolhe o traço até o ponto de origem (pai) antes de sumir,
    // numa única transição suave
    sel.exit()
      .transition().duration(ANIM_MS).ease(ANIM_EASE)
      .attr('d', d => {
        const sourceW = d.source._w || MIN_CAPSULE_W;
        const sx = d.source.y + sourceW + CAPSULE_GAP + CIRCLE_R * 2, sy = d.source.x;
        return `M${sx},${sy} C${sx},${sy} ${sx},${sy} ${sx},${sy}`;
      })
      .remove();

    const enter = sel.enter()
      .append('path')
      .attr('class', 'link-path')
      .attr('stroke', d => colorByIndex(d.source._colorIdx).fill)
      .attr('d', d => {
        // nasce "grudado" na origem (pai), sem comprimento ainda
        const sourceW = d.source._w || MIN_CAPSULE_W;
        const sx = d.source.y + sourceW + CAPSULE_GAP + CIRCLE_R * 2, sy = d.source.x;
        return `M${sx},${sy} C${sx},${sy} ${sx},${sy} ${sx},${sy}`;
      });

    enter.merge(sel)
      .attr('stroke', d => colorByIndex(d.source._colorIdx).fill)
      .transition().duration(ANIM_MS).ease(ANIM_EASE)
      .attr('d', linkPathGen);
  }

  function renderNodes(root){
    let g = zoomLayer.select('g.nodes-layer');
    if (g.empty()) g = zoomLayer.append('g').attr('class', 'nodes-layer');

    const nodes = root.descendants();
    const sel = g.selectAll('g.node-wrapper')
      .data(nodes, d => d.data.id);

    // posição do PAI de um nó que está entrando/saindo — ponto de origem/destino
    // da transição. Nasce no pai e anima direto (X e Y juntos) até a posição
    // final — uma única curva suave, sem fases separadas, similar ao efeito
    // do markmap.
    //
    // IMPORTANTE: para nós SAINDO (colapsando), não confiamos em d.parent —
    // a hierarquia D3 é reconstruída a cada render e, com múltiplos nós
    // saindo/entrando ao mesmo tempo em ramos diferentes, a referência de
    // parent pode ficar incerta. Em vez disso, usamos o ID real do pai (via
    // TreeModel, fonte de verdade dos dados) e procuramos a posição exata
    // desse pai na árvore ANTERIOR (previousRoot), que ainda é estável.
    function parentAnchor(d, useDataRoot){
      const parentData = TreeModel.findParent(d.data.id);
      if (!parentData) return { x: d.x, y: d.y };
      const refRoot = useDataRoot || lastRoot;
      if (refRoot) {
        const foundParent = refRoot.descendants().find(n => n.data.id === parentData.id);
        if (foundParent) return { x: foundParent.x, y: foundParent.y, w: foundParent._w || MIN_CAPSULE_W };
      }
      // fallback: d.parent da própria hierarquia D3 (caso a busca acima falhe)
      if (d.parent) return { x: d.parent.x, y: d.parent.y, w: d.parent._w || MIN_CAPSULE_W };
      return { x: d.x, y: d.y };
    }

    // SAÍDA (colapsar): anima direto da posição atual até a posição do pai
    // (X e Y simultaneamente), com fade, e desaparece — transição única.
    sel.exit()
      .transition().duration(ANIM_MS).ease(ANIM_EASE)
      .attr('transform', function(d){
        const anchor = parentAnchor(d, previousRoot);
        return `translate(${anchor.y},${anchor.x})`;
      })
      .style('opacity', 0)
      .remove();

    const enter = sel.enter()
      .append('g')
      .attr('class', 'node-wrapper')
      .attr('data-node-id', d => d.data.id)
      .attr('transform', d => {
        const anchor = parentAnchor(d);
        return `translate(${anchor.y},${anchor.x})`;
      })
      .style('opacity', 0);

    const merged = enter.merge(sel);

    merged.attr('data-node-id', d => d.data.id);

    // ENTRADA (expandir): nasce na posição do pai e anima direto (X e Y
    // juntos) até a posição final — transição única e suave.
    enter
      .transition().duration(ANIM_MS).ease(ANIM_EASE)
      .style('opacity', 1)
      .attr('transform', d => `translate(${d.y},${d.x})`);

    // nós que já existiam e só mudaram de posição (ex: irmão novo inserido)
    sel.transition().duration(ANIM_MS).ease(ANIM_EASE)
      .attr('transform', d => `translate(${d.y},${d.x})`);

    merged.each(function(d){
      drawNodeContent(d3.select(this), d);
    });
  }

  function drawNodeContent(sel, d){
    sel.selectAll('*').remove();
    const node = d.data;
    const isFocused = node.id === AppState.focusedNodeId;
    const w = d._w || MIN_CAPSULE_W;
    const color = colorByIndex(d._colorIdx);
    const hasChildren = node.children && node.children.length > 0;
    const isOpen = hasChildren && !node.collapsed;
    const capH = getCapsuleH();
    const capRadius = getContainerRadius(capH);

    // ---- CÁPSULA (título, clicável para editar/visualizar) — fica na origem (0,0) ----
    const capsuleGroup = sel.append('g')
      .attr('class', 'tree-capsule' + (isFocused ? ' focused' : ''))
      .attr('transform', `translate(0, ${-capH / 2})`)
      .on('click', (ev) => {
        ev.stopPropagation();
        NodeInteraction.onCapsuleClick(node.id);
      });

    capsuleGroup.append('rect')
      .attr('class', 'capsule-rect')
      .attr('width', w)
      .attr('height', capH)
      .attr('rx', capRadius)
      .attr('fill', color.fill);

    capsuleGroup.append('text')
      .attr('class', 'capsule-label')
      .attr('x', w / 2)
      .attr('y', capH / 2)
      .attr('text-anchor', 'middle')
      .attr('fill', color.text)
      .text(truncate(node.name || 'Sem título', 50));

    // ---- linha curta conectando cápsula ao círculo (nó) ----
    const circleX = w + CAPSULE_GAP + CIRCLE_R;
    sel.append('line')
      .attr('x1', w).attr('y1', 0)
      .attr('x2', circleX - CIRCLE_R).attr('y2', 0)
      .attr('stroke', color.fill)
      .attr('stroke-width', 2);

    // ---- NÓ (círculo clicável) — fica à DIREITA da cápsula, controla expandir/colapsar OS FILHOS deste nó ----
    const circleGroup = sel.append('g')
      .attr('class', 'tree-node-circle' + (isFocused ? ' focused' : '') + (hasChildren ? ' has-children' : ''))
      .attr('transform', `translate(${circleX}, 0)`)
      .on('click', (ev) => {
        ev.stopPropagation();
        NodeInteraction.onCircleClick(node.id);
      });

    circleGroup.append('circle')
      .attr('class', 'circle-base')
      .attr('r', CIRCLE_R)
      .attr('fill', hasChildren ? color.fill : 'var(--panel)')
      .attr('stroke', color.fill)
      .attr('stroke-width', 2);

    // indicador visual de expandir/colapsar (só quando tem filhos)
    if (hasChildren) {
      if (!isOpen) {
        // "+" pequeno dentro do círculo = tem filhos ocultos
        circleGroup.append('line').attr('class', 'circle-glyph')
          .attr('x1', -3.5).attr('y1', 0).attr('x2', 3.5).attr('y2', 0);
        circleGroup.append('line').attr('class', 'circle-glyph')
          .attr('x1', 0).attr('y1', -3.5).attr('x2', 0).attr('y2', 3.5);
      } else {
        // "−" dentro do círculo = filhos visíveis, clique colapsa
        circleGroup.append('line').attr('class', 'circle-glyph')
          .attr('x1', -3.5).attr('y1', 0).attr('x2', 3.5).attr('y2', 0);
      }
    }

    // ---- botão de adicionar filho (só modo edição) — fica depois do círculo ----
    if (AppState.mode === 'edit') {
      const addBtnX = circleX + CIRCLE_R + 26;
      sel.append('line')
        .attr('x1', circleX + CIRCLE_R).attr('y1', 0)
        .attr('x2', addBtnX - 14).attr('y2', 0)
        .attr('stroke', 'var(--border-light)')
        .attr('stroke-width', 1.5)
        .attr('stroke-dasharray', '2,3');

      const addBtn = sel.append('g')
        .attr('class', 'add-btn-group')
        .attr('transform', `translate(${addBtnX}, 0)`)
        .on('click', (ev) => {
          ev.stopPropagation();
          NodeInteraction.onAddChild(node.id);
        });
      addBtn.append('circle').attr('class', 'add-btn-circle').attr('r', 12);
      addBtn.append('line').attr('class', 'add-btn-plus')
        .attr('x1', -5).attr('y1', 0).attr('x2', 5).attr('y2', 0);
      addBtn.append('line').attr('class', 'add-btn-plus')
        .attr('x1', 0).attr('y1', -5).attr('x2', 0).attr('y2', 5);
    }
  }

  function truncate(str, max){
    if (!str) return '';
    return str.length > max ? str.slice(0, max - 1) + '…' : str;
  }

  function getNodeScreenPos(id){
    if (!lastRoot) return null;
    const found = lastRoot.descendants().find(d => d.data.id === id);
    if (!found) return null;
    const w = found._w || MIN_CAPSULE_W;
    const totalW = CIRCLE_R * 2 + CAPSULE_GAP + w;
    const capH = getCapsuleH();
    return { x: found.y - CIRCLE_R, y: found.x - capH / 2, w: totalW, h: capH };
  }

  function focusOn(idList, opts){
    // idList tipicamente [pai, atual]. O nó ATUAL (último da lista) é sempre
    // o que fica centralizado na tela, mantendo o nível de zoom atual (a
    // menos que opts.scale seja passado). O(s) outro(s) só influenciam o
    // enquadramento se isso não empurrar o nó atual pra fora do centro.
    const positions = idList.map(getNodeScreenPos).filter(Boolean);
    if (!positions.length) return;

    const current = positions[positions.length - 1];
    const currentCenterX = current.x + current.w / 2;
    const currentCenterY = current.y + current.h / 2;

    const viewW = wrap.clientWidth;
    const viewH = wrap.clientHeight;
    const k = (opts && opts.scale) || currentTransform.k;

    let targetCenterX = currentCenterX;
    let targetCenterY = currentCenterY;

    if (positions.length > 1) {
      const others = positions.slice(0, -1);
      const minX = Math.min(current.x, ...others.map(p => p.x));
      const maxX = Math.max(current.x + current.w, ...others.map(p => p.x + p.w));
      const minY = Math.min(current.y, ...others.map(p => p.y));
      const maxY = Math.max(current.y + current.h, ...others.map(p => p.y + p.h));

      const spanW = (maxX - minX) * k;
      const spanH = (maxY - minY) * k;

      if (spanW + 80 <= viewW) targetCenterX = (minX + maxX) / 2;
      if (spanH + 80 <= viewH) targetCenterY = (minY + maxY) / 2;
    }

    const tx = viewW / 2 - targetCenterX * k;
    const ty = viewH / 2 - targetCenterY * k;
    zoomTo(d3.zoomIdentity.translate(tx, ty).scale(k), 450);
  }

  function fitToScreen(){
    // calcula a bounding box de TODOS os nós visíveis e ajusta translate+scale
    // pra caber tudo na viewport, com uma margem confortável
    if (!lastRoot) return;
    const nodes = lastRoot.descendants();
    if (!nodes.length) return;

    let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
    nodes.forEach(d => {
      const pos = getNodeScreenPos(d.data.id);
      if (!pos) return;
      minX = Math.min(minX, pos.x);
      maxX = Math.max(maxX, pos.x + pos.w);
      minY = Math.min(minY, pos.y);
      maxY = Math.max(maxY, pos.y + pos.h);
    });

    const treeW = maxX - minX;
    const treeH = maxY - minY;
    const TOPBAR_H = 56; // altura da topbar — desconta da área útil pra não centralizar atrás dela
    const viewW = wrap.clientWidth;
    const viewH = wrap.clientHeight - TOPBAR_H;
    const MARGIN = 64;

    const scaleX = (viewW - MARGIN * 2) / treeW;
    const scaleY = (viewH - MARGIN * 2) / treeH;
    const k = Math.min(scaleX, scaleY, ZOOM_MAX);
    const kClamped = Math.max(k, ZOOM_MIN);

    const centerX = (minX + maxX) / 2;
    const centerY = (minY + maxY) / 2;

    const tx = viewW / 2 - centerX * kClamped;
    const ty = TOPBAR_H + viewH / 2 - centerY * kClamped;

    zoomTo(d3.zoomIdentity.translate(tx, ty).scale(kClamped), 450);
  }

  function getNodeAbsoluteCenter(id){
    // posição do nó em coordenadas de MUNDO (antes do zoom/pan) — usada pela busca
    const pos = getNodeScreenPos(id);
    if (!pos) return null;
    return { x: pos.x + pos.w / 2, y: pos.y + pos.h / 2 };
  }

  return {
    render, colorByIndex, focusOn, fitToScreen, getNodeScreenPos, getNodeAbsoluteCenter,
    zoomBy, zoomTo, capsuleWidth, getCapsuleH, CIRCLE_R,
    get zoomScale(){ return currentTransform.k; },
    get ZOOM_MIN(){ return ZOOM_MIN; },
    get ZOOM_MAX(){ return ZOOM_MAX; }
  };
})();

/* =========================================================
   INTERAÇÃO COM NÓS (cliques, criação, edição, visualização)
   ========================================================= */
const NodeInteraction = (() => {

  /* clique no NÓ (círculo) — expande/colapsa os filhos */
  function onCircleClick(nodeId){
    const node = TreeModel.findNode(nodeId);
    if (!node) return;
    if (node.children.length === 0) return; // nada a expandir
    TreeModel.toggleCollapsed(nodeId);
    AppState.focusedNodeId = nodeId;
    Renderer.render();
    Renderer.focusOn([nodeId]);
  }

  /* clique na CÁPSULA (título) — edita (modo edição) ou visualiza (modo visualização) */
  function onCapsuleClick(nodeId){
    if (AppState.mode === 'edit') {
      openEditModal(nodeId, false);
    } else {
      const parentId = TreeModel.findParent(nodeId)?.id || null;
      AppState.focusedNodeId = nodeId;
      Renderer.render();
      Renderer.focusOn(parentId ? [parentId, nodeId] : [nodeId]);
      openViewPanel(nodeId);
    }
  }

  /* clique no botão de "+" — cria nó filho vazio, SEM abrir modal automaticamente */
  function onAddChild(parentId){
    const child = TreeModel.addChild(parentId, '', '');
    TreeModel.updateNode(parentId, { collapsed: false }); // garante que o novo filho fique visível
    AppState.focusedNodeId = child.id;
    Renderer.render();
    requestAnimationFrame(() => {
      Renderer.focusOn([parentId, child.id]);
    });
  }

  function onEditNode(nodeId){
    openEditModal(nodeId, false);
  }

  /* ---------- MODAL DE EDIÇÃO (nome + texto) ---------- */
  function openEditModal(nodeId, isNew){
    const node = TreeModel.findNode(nodeId);
    if (!node) return;

    const overlay = document.createElement('div');
    overlay.className = 'mt-overlay';
    overlay.innerHTML = `
      <div class="mt-modal">
        <div class="mt-modal-head">
          <span>${isNew ? 'Novo nó' : 'Editar nó'}</span>
          <button class="mt-x" data-action="close">&times;</button>
        </div>
        <div class="mt-modal-body">
          <label class="mt-label">Nome</label>
          <input type="text" class="mt-input" id="mt-field-name" placeholder="Título curto" maxlength="60" value="${escapeAttr(node.name)}" />
          <label class="mt-label">Texto</label>
          <textarea class="mt-textarea" id="mt-field-text" placeholder="Descrição, detalhes...">${escapeHtml(node.text)}</textarea>
        </div>
        <div class="mt-modal-foot">
          ${!isNew && node.id !== TreeModel.getRoot().id ? '<button class="mt-btn danger" data-action="delete">Excluir nó</button>' : '<span></span>'}
          <button class="mt-btn primary" data-action="save">Salvar</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);

    const nameInput = overlay.querySelector('#mt-field-name');
    const textInput = overlay.querySelector('#mt-field-text');
    nameInput.focus();
    nameInput.select();

    function close(){ overlay.remove(); }

    function save(){
      const name = nameInput.value.trim();
      const text = textInput.value.trim();
      TreeModel.updateNode(nodeId, { name: name || 'Sem nome', text });
      AppState.focusedNodeId = nodeId;
      close();
      Renderer.render();
      const parentId = TreeModel.findParent(nodeId)?.id;
      Renderer.focusOn(parentId ? [parentId, nodeId] : [nodeId]);
      SheetPanel.refresh();
    }

    overlay.addEventListener('click', (ev) => {
      const action = ev.target.dataset.action;
      if (ev.target === overlay || action === 'close') {
        close();
        Renderer.render();
      } else if (action === 'save') {
        save();
      } else if (action === 'delete') {
        if (confirm('Excluir este nó e todos os seus destinos?')) {
          TreeModel.removeNode(nodeId);
          AppState.focusedNodeId = null;
          close();
          Renderer.render();
          SheetPanel.refresh();
        }
      }
    });

    overlay.addEventListener('keydown', (ev) => {
      if (ev.key === 'Escape') { close(); Renderer.render(); }
      if (ev.key === 'Enter' && ev.ctrlKey) save();
    });
  }

  /* ---------- PAINEL DE VISUALIZAÇÃO (nome + texto + filhos) ---------- */
  function openViewPanel(nodeId, history){
    history = history || [];
    const node = TreeModel.findNode(nodeId);
    if (!node) return;

    let panel = document.getElementById('mt-view-panel');
    if (panel) panel.remove();

    panel = document.createElement('div');
    panel.id = 'mt-view-panel';
    panel.className = 'mt-overlay mt-view-overlay';

    const childrenHtml = node.children.length
      ? node.children.map(c => `
          <div class="mt-child-row" data-child-id="${c.id}">
            <div class="mt-child-main">
              <div class="mt-child-name">${escapeHtml(c.name || '(sem nome)')}</div>
              ${c.text ? `<div class="mt-child-text">${escapeHtml(truncate(c.text, 80))}</div>` : ''}
            </div>
            ${c.children.length ? `<span class="mt-child-count">${c.children.length}</span>` : ''}
            <svg class="mt-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg>
          </div>
        `).join('')
      : '<div class="mt-empty-children">Este nó não tem destinos.</div>';

    const backBtnHtml = history.length
      ? `<button class="mt-back" data-action="back" title="Voltar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg></button>`
      : '';

    panel.innerHTML = `
      <div class="mt-view-panel">
        <div class="mt-modal-head">
          <div class="mt-modal-head-left">
            ${backBtnHtml}
            <span>${escapeHtml(node.name || '(sem nome)')}</span>
          </div>
          <button class="mt-x" data-action="close">&times;</button>
        </div>
        <div class="mt-modal-body">
          ${node.text ? `<p class="mt-view-text">${escapeHtml(node.text)}</p>` : '<p class="mt-view-text mt-faint">Sem descrição.</p>'}
          <div class="mt-children-title">Destinos (${node.children.length})</div>
          <div class="mt-children-list">${childrenHtml}</div>
        </div>
      </div>
    `;
    document.body.appendChild(panel);

    panel.addEventListener('click', (ev) => {
      const backBtn = ev.target.closest('[data-action="back"]');
      if (backBtn) {
        const prevId = history[history.length - 1];
        const newHistory = history.slice(0, -1);
        panel.remove();
        AppState.focusedNodeId = prevId;
        Renderer.render();
        const prevParentId = TreeModel.findParent(prevId)?.id;
        Renderer.focusOn(prevParentId ? [prevParentId, prevId] : [prevId]);
        openViewPanel(prevId, newHistory);
        return;
      }
      const childRow = ev.target.closest('.mt-child-row');
      if (childRow) {
        const childId = childRow.dataset.childId;
        panel.remove();
        AppState.focusedNodeId = childId;
        Renderer.render();
        Renderer.focusOn([nodeId, childId]);
        openViewPanel(childId, [...history, nodeId]);
        return;
      }
      if (ev.target === panel || ev.target.dataset.action === 'close') {
        panel.remove();
      }
    });
  }

  function truncate(str, max){
    if (!str) return '';
    return str.length > max ? str.slice(0, max - 1) + '…' : str;
  }
  function escapeHtml(str){
    if (!str) return '';
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }
  function escapeAttr(str){
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
  }

  return { onAddChild, onEditNode, onCircleClick, onCapsuleClick, openEditModal, openViewPanel };
})();

/* =========================================================
   PAINEL PLANILHA (drawer lateral, editável, reflete na árvore)
   Formato: cada linha = um nó. Colunas = nível 1, nível 2, ... nível N.
   Uma coluna extra mostra "origem" (nó pai).
   ========================================================= */
const SheetPanel = (() => {
  const drawer = document.getElementById('sheet-drawer');
  const overlay = document.getElementById('sheet-overlay');
  const table = document.getElementById('sheet-table');
  const info = document.getElementById('sheet-info');

  function flattenRows(){
    // gera uma linha por nó, com o nome posicionado na coluna do seu nível
    const rows = [];
    function walk(node, depth, parentId){
      rows.push({ id: node.id, parentId, depth, name: node.name, text: node.text });
      node.children.forEach(c => walk(c, depth + 1, node.id));
    }
    walk(TreeModel.getRoot(), 0, null);
    return rows;
  }

  function render(){
    const rows = flattenRows();
    const maxDepth = TreeModel.maxDepth();
    const colCount = maxDepth + 1;

    let html = '<thead><tr>';
    for (let i = 0; i < colCount; i++){
      const colName = getColumnName(i + 1);
      html += `<th><input class="sheet-header-input" data-level="${i + 1}" value="${escapeAttr(colName)}" /></th>`;
    }
    html += '<th>Texto</th><th>Origem</th></tr></thead><tbody>';

    rows.forEach(row => {
      html += '<tr data-node-id="' + row.id + '">';
      for (let i = 0; i < colCount; i++){
        if (i === row.depth){
          html += `<td><input class="sheet-cell-input" data-field="name" data-node-id="${row.id}" value="${escapeAttr(row.name)}" placeholder="Nome" /></td>`;
        } else {
          html += '<td class="sheet-cell-empty"></td>';
        }
      }
      html += `<td><textarea class="sheet-cell-input" data-field="text" data-node-id="${row.id}" rows="1" placeholder="Texto...">${escapeHtml(row.text)}</textarea></td>`;
      const parentName = row.parentId ? (TreeModel.findNode(row.parentId)?.name || '—') : '—';
      html += `<td class="sheet-rel-col">${row.parentId ? escapeHtml(parentName) : 'raiz'}</td>`;
      html += '</tr>';
    });
    html += '</tbody>';
    table.innerHTML = html;
    info.textContent = `${rows.length} nó(s) · ${colCount} nível(is)`;
  }

  function bindEvents(){
    table.addEventListener('input', (ev) => {
      const target = ev.target;
      if (target.classList.contains('sheet-header-input')) {
        const level = parseInt(target.dataset.level, 10);
        AppState.columnNames[level - 1] = target.value;
        Renderer.render(); // labels de nível podem aparecer em outros lugares no futuro
        return;
      }
      if (!target.dataset.nodeId) return;
      const nodeId = target.dataset.nodeId;
      const field = target.dataset.field;
      TreeModel.updateNode(nodeId, { [field]: target.value });
      Renderer.render();
    });

    document.getElementById('sheet-close').addEventListener('click', close);
    overlay.addEventListener('click', close);
  }

  function open(){
    render();
    drawer.classList.add('open');
    overlay.classList.add('open');
  }
  function close(){
    drawer.classList.remove('open');
    overlay.classList.remove('open');
  }
  function refresh(){
    if (drawer.classList.contains('open')) render();
  }

  function escapeHtml(str){
    if (!str) return '';
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }
  function escapeAttr(str){
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
  }

  bindEvents();
  return { open, close, refresh, flattenRows };
})();

/* =========================================================
   PAINEL DE ESTILO (drawer lateral — formato, altura, linhas)
   ========================================================= */
const StylePanel = (() => {
  const drawer = document.getElementById('style-drawer');
  const overlay = document.getElementById('style-overlay');

  function syncActiveStates(){
    document.querySelectorAll('[data-shape]').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.shape === AppState.containerShape);
    });
    document.querySelectorAll('[data-height]').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.height === AppState.containerHeight);
    });
    document.querySelectorAll('[data-line]').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.line === AppState.lineStyle);
    });
  }

  function bindEvents(){
    document.querySelectorAll('[data-shape]').forEach(btn => {
      btn.addEventListener('click', () => {
        AppState.containerShape = btn.dataset.shape;
        syncActiveStates();
        Renderer.render();
      });
    });
    document.querySelectorAll('[data-height]').forEach(btn => {
      btn.addEventListener('click', () => {
        AppState.containerHeight = btn.dataset.height;
        syncActiveStates();
        Renderer.render();
      });
    });
    document.querySelectorAll('[data-line]').forEach(btn => {
      btn.addEventListener('click', () => {
        AppState.lineStyle = btn.dataset.line;
        syncActiveStates();
        Renderer.render();
      });
    });

    document.getElementById('style-close').addEventListener('click', close);
    overlay.addEventListener('click', close);
  }

  function open(){
    syncActiveStates();
    drawer.classList.add('open');
    overlay.classList.add('open');
  }
  function close(){
    drawer.classList.remove('open');
    overlay.classList.remove('open');
  }

  bindEvents();
  return { open, close };
})();

/* =========================================================
   GERENCIADOR DE PROJETOS (lista nomeada salva no navegador)
   ========================================================= */
const ProjectManager = (() => {
  const STORAGE_KEY = 'mindtree-projects';
  const drawer = document.getElementById('projects-drawer');
  const overlay = document.getElementById('projects-overlay');
  const listEl = document.getElementById('projects-list');

  let currentProjectId = null; // id do projeto atualmente carregado, se houver

  function loadAll(){
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch (e) {
      return [];
    }
  }

  function saveAll(projects){
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(projects));
      return true;
    } catch (e) {
      alert('Não foi possível salvar: armazenamento local indisponível ou cheio.');
      return false;
    }
  }

  function genId(){
    return 'p' + Date.now() + Math.random().toString(36).slice(2, 7);
  }

  function formatDate(ts){
    const d = new Date(ts);
    return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' }) +
      ' ' + d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  }

  function snapshotState(){
    return {
      tree: TreeModel.getRoot(),
      colorLevels: AppState.colorLevels,
      containerShape: AppState.containerShape,
      containerHeight: AppState.containerHeight,
      lineStyle: AppState.lineStyle,
      columnNames: AppState.columnNames,
      customPalette: AppState.customPalette,
      rootColor: AppState.rootColor,
    };
  }

  function saveAsNew(forcedName){
    const defaultName = TreeModel.getRoot().name || 'Projeto sem nome';
    let trimmed;
    if (forcedName !== undefined) {
      trimmed = forcedName;
    } else {
      const name = prompt('Nome do projeto:', defaultName);
      if (name === null) return; // cancelado
      trimmed = name.trim() || defaultName;
    }

    const projects = loadAll();
    const entry = {
      id: genId(),
      name: trimmed,
      savedAt: Date.now(),
      state: snapshotState(),
    };
    projects.unshift(entry);
    if (saveAll(projects)) {
      currentProjectId = entry.id;
      render();
      ProjectNameBar.markClean();
      ProjectNameBar.refresh();
      Toast.show('Projeto salvo');
    }
  }

  // "Salvar" — se já existe um projeto carregado, sobrescreve ELE diretamente
  // (sem perguntar nome de novo). Se não há nenhum projeto carregado ainda
  // (árvore nova, nunca salva), comporta-se como "salvar como": pede um nome
  // e cria a primeira entrada na lista.
  function save(){
    if (currentProjectId) {
      const projects = loadAll();
      const exists = projects.some(p => p.id === currentProjectId);
      if (exists) {
        overwrite(currentProjectId);
        return;
      }
      // projeto foi excluído da lista por fora — trata como novo
      currentProjectId = null;
    }
    saveAsNew();
  }

  // "Salvar como" — sempre pede um nome novo e cria uma cópia/nova entrada,
  // independente de já existir um projeto carregado.
  function saveAs(){
    saveAsNew();
  }

  function overwrite(id){
    const projects = loadAll();
    const idx = projects.findIndex(p => p.id === id);
    if (idx === -1) return;
    projects[idx].state = snapshotState();
    projects[idx].savedAt = Date.now();
    if (saveAll(projects)) {
      currentProjectId = id;
      render();
      ProjectNameBar.markClean();
      ProjectNameBar.refresh();
      Toast.show('Projeto salvo');
    }
  }

  function loadProject(id){
    const projects = loadAll();
    const entry = projects.find(p => p.id === id);
    if (!entry) return;

    TreeModel.setRoot(entry.state.tree);
    AppState.colorLevels = entry.state.colorLevels ?? AppState.colorLevels;
    AppState.containerShape = entry.state.containerShape ?? AppState.containerShape;
    AppState.containerHeight = entry.state.containerHeight ?? AppState.containerHeight;
    AppState.lineStyle = entry.state.lineStyle ?? AppState.lineStyle;
    AppState.columnNames = entry.state.columnNames ?? [];
    AppState.customPalette = (entry.state.customPalette && entry.state.customPalette.length) ? entry.state.customPalette : [...DEFAULT_PALETTE_HEX];
    AppState.rootColor = entry.state.rootColor || DEFAULT_ROOT_COLOR;
    AppState.focusedNodeId = null;

    currentProjectId = id;
    Renderer.render();
    requestAnimationFrame(() => Renderer.fitToScreen());
    SheetPanel.refresh();
    ProjectNameBar.markClean();
    ProjectNameBar.refresh();
    close();
  }

  function renameProject(id){
    const projects = loadAll();
    const entry = projects.find(p => p.id === id);
    if (!entry) return;
    const name = prompt('Novo nome do projeto:', entry.name);
    if (name === null) return;
    entry.name = name.trim() || entry.name;
    saveAll(projects);
    render();
    if (id === currentProjectId) ProjectNameBar.refresh();
  }

  function deleteProject(id){
    const projects = loadAll();
    const entry = projects.find(p => p.id === id);
    if (!entry) return;
    if (!confirm(`Excluir o projeto "${entry.name}"? Essa ação não pode ser desfeita.`)) return;
    const filtered = projects.filter(p => p.id !== id);
    saveAll(filtered);
    if (currentProjectId === id) {
      currentProjectId = null;
      ProjectNameBar.refresh();
    }
    render();
  }

  function render(){
    const projects = loadAll();
    if (!projects.length) {
      listEl.innerHTML = '<div class="projects-empty">Nenhum projeto salvo ainda.</div>';
      return;
    }
    listEl.innerHTML = projects.map(p => `
      <div class="project-row${p.id === currentProjectId ? ' current' : ''}" data-id="${p.id}">
        <div class="project-row-main">
          <div class="project-row-name">${escapeHtml(p.name)}</div>
          <div class="project-row-meta">${formatDate(p.savedAt)}</div>
        </div>
        <div class="project-row-actions">
          <button class="project-action-btn" data-action="overwrite" data-id="${p.id}" title="Atualizar com o estado atual">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 3-6.7M3 4v5h5"/></svg>
          </button>
          <button class="project-action-btn" data-action="rename" data-id="${p.id}" title="Renomear">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H5a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-6"/><path d="M18.5 2.5a2.1 2.1 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button class="project-action-btn danger" data-action="delete" data-id="${p.id}" title="Excluir">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6h14z"/></svg>
          </button>
        </div>
      </div>
    `).join('');
  }

  function escapeHtml(str){
    if (!str) return '';
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  function getCurrentProjectName(){
    if (!currentProjectId) return null;
    const projects = loadAll();
    const entry = projects.find(p => p.id === currentProjectId);
    return entry ? entry.name : null;
  }

  function getCurrentProjectId(){ return currentProjectId; }

  function clearCurrentProject(){
    currentProjectId = null;
    ProjectNameBar.refresh();
  }

  function startNewProject(){
    if (!confirm('Iniciar um novo projeto? As alterações não salvas do projeto atual serão perdidas.')) return;
    TreeModel.setRoot(TreeModel.createNode('Novo projeto', ''));
    AppState.focusedNodeId = null;
    AppState.colorLevels = 4;
    AppState.containerShape = 'capsule';
    AppState.containerHeight = 'max';
    AppState.lineStyle = 'smooth';
    AppState.columnNames = [];
    AppState.customPalette = [...DEFAULT_PALETTE_HEX];
    AppState.rootColor = DEFAULT_ROOT_COLOR;
    currentProjectId = null;
    Renderer.render();
    requestAnimationFrame(() => Renderer.fitToScreen());
    SheetPanel.refresh();
    ProjectNameBar.markClean();
    ProjectNameBar.refresh();
    close();
  }

  function bindEvents(){
    document.getElementById('btn-new-project').addEventListener('click', startNewProject);
    document.getElementById('btn-save-project').addEventListener('click', save);
    document.getElementById('btn-save-as-project').addEventListener('click', saveAs);
    document.getElementById('projects-close').addEventListener('click', close);
    overlay.addEventListener('click', close);

    listEl.addEventListener('click', (ev) => {
      const actionBtn = ev.target.closest('[data-action]');
      if (actionBtn) {
        ev.stopPropagation();
        const id = actionBtn.dataset.id;
        const action = actionBtn.dataset.action;
        if (action === 'overwrite') {
          if (confirm('Atualizar este projeto salvo com o estado atual da árvore?')) overwrite(id);
        } else if (action === 'rename') {
          renameProject(id);
        } else if (action === 'delete') {
          deleteProject(id);
        }
        return;
      }
      const row = ev.target.closest('.project-row');
      if (row) loadProject(row.dataset.id);
    });
  }

  function open(){
    render();
    drawer.classList.add('open');
    overlay.classList.add('open');
  }
  function close(){
    drawer.classList.remove('open');
    overlay.classList.remove('open');
  }

  bindEvents();
  return { open, close, save, saveAs, startNewProject, getCurrentProjectName, getCurrentProjectId, clearCurrentProject };
})();

/* =========================================================
   BARRA DE NOME DO PROJETO (topo, centralizada)
   Mostra qual projeto está carregado e atualiza o label do botão Salvar
   pra deixar claro que "Salvar" vai sobrescrever esse projeto específico.
   ========================================================= */
const ProjectNameBar = (() => {
  const textEl = document.getElementById('project-name-text');
  const unsavedEl = document.getElementById('project-name-unsaved');
  let dirty = false; // true quando há alterações desde o último save

  function refresh(){
    const name = ProjectManager.getCurrentProjectName();
    if (name) {
      textEl.textContent = name;
    } else {
      textEl.textContent = TreeModel.getRoot().name || 'Sem título';
    }
    const saveLabel = document.getElementById('btn-save-project-label');
    if (saveLabel) {
      saveLabel.textContent = name ? 'Salvar' : 'Salvar projeto';
    }
    unsavedEl.classList.toggle('show', dirty);

    const saveBtn = document.getElementById('btn-save-project');
    if (saveBtn) {
      saveBtn.disabled = !dirty;
      saveBtn.classList.toggle('is-disabled', !dirty);
    }
  }

  function markDirty(){
    if (!dirty) {
      dirty = true;
      unsavedEl.classList.add('show');
      const saveBtn = document.getElementById('btn-save-project');
      if (saveBtn) { saveBtn.disabled = false; saveBtn.classList.remove('is-disabled'); }
    }
  }
  function markClean(){
    dirty = false;
    unsavedEl.classList.remove('show');
    const saveBtn = document.getElementById('btn-save-project');
    if (saveBtn) { saveBtn.disabled = true; saveBtn.classList.add('is-disabled'); }
  }

  return { refresh, markDirty, markClean };
})();

/* =========================================================
   TOAST (mensagem rápida de confirmação, some sozinha)
   ========================================================= */
const Toast = (() => {
  const el = document.getElementById('save-toast');
  let hideTimer = null;
  const checkIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>';

  function show(message, duration){
    duration = duration ?? 2200;
    el.innerHTML = checkIcon + '<span>' + message + '</span>';
    el.classList.add('show');
    clearTimeout(hideTimer);
    hideTimer = setTimeout(() => {
      el.classList.remove('show');
    }, duration);
  }

  return { show };
})();

/* =========================================================
   SELETOR DE CORES (popover)
   ========================================================= */
const ColorSelector = (() => {
  const drawer = document.getElementById('color-drawer');
  const overlay = document.getElementById('color-overlay');
  const levelButtonsWrap = document.getElementById('color-level-buttons');
  const rootColorInput = document.getElementById('root-color-input');
  const rootColorHex = document.getElementById('root-color-hex');
  const rootColorReset = document.getElementById('root-color-reset');
  const paletteList = document.getElementById('color-palette-list');
  const addBtn = document.getElementById('color-add-btn');
  const MAX_LEVELS = 6;

  function normalizeHex(v){
    v = (v || '').trim();
    if (!v.startsWith('#')) v = '#' + v;
    if (/^#[0-9a-fA-F]{6}$/.test(v)) return v.toLowerCase();
    if (/^#[0-9a-fA-F]{3}$/.test(v)) {
      const h = v.slice(1);
      return '#' + h.split('').map(c => c + c).join('').toLowerCase();
    }
    return null;
  }

  function buildLevelButtons(){
    let html = '';
    for (let i = 1; i <= MAX_LEVELS; i++){
      html += `<button class="color-level-btn${i === AppState.colorLevels ? ' active' : ''}" data-level="${i}">${i}</button>`;
    }
    levelButtonsWrap.innerHTML = html;
    levelButtonsWrap.querySelectorAll('.color-level-btn').forEach(b => {
      b.addEventListener('click', () => {
        AppState.colorLevels = parseInt(b.dataset.level, 10);
        buildLevelButtons();
        Renderer.render();
      });
    });
  }

  function buildRootColor(){
    const hex = AppState.rootColor || DEFAULT_ROOT_COLOR;
    rootColorInput.value = hex;
    rootColorHex.value = hex;
  }

  function buildPaletteList(){
    const palette = AppState.customPalette && AppState.customPalette.length ? AppState.customPalette : [...DEFAULT_PALETTE_HEX];
    paletteList.innerHTML = palette.map((hex, i) => `
      <div class="color-palette-row" data-idx="${i}">
        <span class="color-palette-idx">${i + 1}</span>
        <input type="color" class="color-palette-swatch" data-idx="${i}" value="${hex}" />
        <input type="text" class="color-palette-hex" data-idx="${i}" value="${hex}" maxlength="7" />
        <div class="color-palette-actions">
          <button class="color-palette-action-btn" data-action="edit" data-idx="${i}" title="Focar no seletor de cor">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H5a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-6"/><path d="M18.5 2.5a2.1 2.1 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button class="color-palette-action-btn danger" data-action="delete" data-idx="${i}" title="Remover cor">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6h14z"/></svg>
          </button>
        </div>
      </div>
    `).join('');
  }

  function commitPaletteColor(idx, hex){
    const normalized = normalizeHex(hex);
    if (!normalized) return false;
    if (!AppState.customPalette || !AppState.customPalette.length) AppState.customPalette = [...DEFAULT_PALETTE_HEX];
    AppState.customPalette[idx] = normalized;
    Renderer.render();
    return true;
  }

  function deletePaletteColor(idx){
    if (!AppState.customPalette || AppState.customPalette.length <= 1) return; // mantém ao menos 1 cor
    AppState.customPalette.splice(idx, 1);
    buildPaletteList();
    Renderer.render();
  }

  function addPaletteColor(){
    if (!AppState.customPalette) AppState.customPalette = [...DEFAULT_PALETTE_HEX];
    if (AppState.customPalette.length >= 20) return; // limite de 20 cores
    // próxima cor sugerida: gira o matiz a partir da última cor da lista
    const last = AppState.customPalette[AppState.customPalette.length - 1] || '#888888';
    AppState.customPalette.push(last);
    buildPaletteList();
    Renderer.render();
  }

  function bindPaletteEvents(){
    paletteList.addEventListener('input', (ev) => {
      const idx = parseInt(ev.target.dataset.idx, 10);
      if (isNaN(idx)) return;
      if (ev.target.classList.contains('color-palette-swatch')) {
        commitPaletteColor(idx, ev.target.value);
        const hexField = paletteList.querySelector(`.color-palette-hex[data-idx="${idx}"]`);
        if (hexField) hexField.value = ev.target.value;
      } else if (ev.target.classList.contains('color-palette-hex')) {
        const normalized = normalizeHex(ev.target.value);
        if (normalized) {
          commitPaletteColor(idx, normalized);
          const swatch = paletteList.querySelector(`.color-palette-swatch[data-idx="${idx}"]`);
          if (swatch) swatch.value = normalized;
        }
      }
    });

    paletteList.addEventListener('click', (ev) => {
      const btn = ev.target.closest('[data-action]');
      if (!btn) return;
      const idx = parseInt(btn.dataset.idx, 10);
      if (btn.dataset.action === 'edit') {
        const swatch = paletteList.querySelector(`.color-palette-swatch[data-idx="${idx}"]`);
        if (swatch) swatch.click(); // abre o seletor de cor nativo do navegador
      } else if (btn.dataset.action === 'delete') {
        deletePaletteColor(idx);
      }
    });
  }

  function bindRootColorEvents(){
    rootColorInput.addEventListener('input', () => {
      AppState.rootColor = rootColorInput.value;
      rootColorHex.value = rootColorInput.value;
      Renderer.render();
    });
    rootColorHex.addEventListener('input', () => {
      const normalized = normalizeHex(rootColorHex.value);
      if (normalized) {
        AppState.rootColor = normalized;
        rootColorInput.value = normalized;
        Renderer.render();
      }
    });
    rootColorReset.addEventListener('click', () => {
      AppState.rootColor = DEFAULT_ROOT_COLOR;
      buildRootColor();
      Renderer.render();
    });
  }

  function open(){
    buildLevelButtons();
    buildRootColor();
    buildPaletteList();
    drawer.classList.add('open');
    overlay.classList.add('open');
  }
  function close(){
    drawer.classList.remove('open');
    overlay.classList.remove('open');
  }
  function toggle(){
    if (drawer.classList.contains('open')) close();
    else open();
  }

  document.getElementById('color-close').addEventListener('click', close);
  overlay.addEventListener('click', close);
  addBtn.addEventListener('click', addPaletteColor);
  bindPaletteEvents();
  bindRootColorEvents();

  return { toggle, open, close };
})();

/* =========================================================
   IMPORTAR / EXPORTAR (CSV, Excel via SheetJS, HTML standalone)
   ========================================================= */
const ImportExport = (() => {

  let xlsxLoaded = false;
  function ensureXLSX(){
    return new Promise((resolve, reject) => {
      if (window.XLSX) { xlsxLoaded = true; return resolve(); }
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';
      s.onload = () => { xlsxLoaded = true; resolve(); };
      s.onerror = reject;
      document.head.appendChild(s);
    });
  }

  /* ---------- EXPORTAR CSV/XLSX ---------- */
  function buildSheetMatrix(){
    const rows = SheetPanel.flattenRows();
    const maxDepth = TreeModel.maxDepth();
    const colCount = maxDepth + 1;
    const header = [];
    for (let i = 0; i < colCount; i++) header.push(getColumnName(i + 1));
    header.push('Texto', 'Origem');

    const matrix = [header];
    rows.forEach(row => {
      const line = new Array(colCount).fill('');
      line[row.depth] = row.name;
      line.push(row.text || '');
      const parentName = row.parentId ? (TreeModel.findNode(row.parentId)?.name || '') : '';
      line.push(parentName);
      matrix.push(line);
    });
    return matrix;
  }

  function downloadBlob(blob, filename){
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }

  function escapeHtmlBuild(str){
    if (!str) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function exportCSV(){
    const matrix = buildSheetMatrix();
    const csv = matrix.map(row =>
      row.map(cell => {
        const s = String(cell ?? '');
        return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
      }).join(',')
    ).join('\r\n');
    downloadBlob(new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' }), 'mindtree.csv');
  }

  async function exportXLSX(){
    await ensureXLSX();
    const matrix = buildSheetMatrix();
    const ws = XLSX.utils.aoa_to_sheet(matrix);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'MindTree');
    XLSX.writeFile(wb, 'mindtree.xlsx');
  }

  /* ---------- EXPORTAR EM "CAMPOS COMBINADOS" (tabela tradicional) ----------
     Formato inverso da importação de campos combinados: gera uma linha por
     nó FOLHA (sem filhos), repetindo o valor de cada ancestral em sua própria
     coluna — exatamente como uma planilha de banco de dados tradicional,
     sem células vazias por repetição de categoria/subcategoria. */
  function buildCombinedFieldsMatrix(){
    const root = TreeModel.getRoot();
    const maxDepth = TreeModel.maxDepth();
    const colCount = maxDepth + 1; // inclui a raiz como 1ª coluna

    const header = [];
    for (let i = 0; i < colCount; i++) header.push(getColumnName(i + 1));
    header.push('Texto');

    const matrix = [header];

    function walk(node, ancestors){
      const path = [...ancestors, node.name];
      if (!node.children || node.children.length === 0) {
        // nó folha: gera uma linha, preenchendo todas as colunas até aqui
        // e repetindo o último valor nas colunas restantes (caso a folha
        // esteja em um nível mais raso que maxDepth)
        const line = new Array(colCount).fill('');
        for (let i = 0; i < colCount; i++){
          line[i] = i < path.length ? path[i] : path[path.length - 1];
        }
        line.push(node.text || '');
        matrix.push(line);
      } else {
        node.children.forEach(c => walk(c, path));
      }
    }
    walk(root, []);

    return matrix;
  }

  function exportCombinedCSV(){
    const matrix = buildCombinedFieldsMatrix();
    const csv = matrix.map(row =>
      row.map(cell => {
        const s = String(cell ?? '');
        return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
      }).join(',')
    ).join('\r\n');
    downloadBlob(new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' }), 'mindtree-campos-combinados.csv');
  }

  async function exportCombinedXLSX(){
    await ensureXLSX();
    const matrix = buildCombinedFieldsMatrix();
    const ws = XLSX.utils.aoa_to_sheet(matrix);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'MindTree');
    XLSX.writeFile(wb, 'mindtree-campos-combinados.xlsx');
  }

  /* ---------- EXPORTAR HTML (apresentação, somente visualização) ---------- */
  function exportHTML(){
    const dataJson = JSON.stringify(TreeModel.getRoot());
    const colorLevels = AppState.colorLevels;
    const projectName = ProjectManager.getCurrentProjectName() || TreeModel.getRoot().name || 'Sem título';
    const columnNamesJson = JSON.stringify(AppState.columnNames || []);
    const customPaletteJson = JSON.stringify((AppState.customPalette && AppState.customPalette.length) ? AppState.customPalette : DEFAULT_PALETTE_HEX);
    const rootColor = AppState.rootColor || DEFAULT_ROOT_COLOR;
    const html = buildStandaloneHTML(dataJson, colorLevels, AppState.containerShape, AppState.containerHeight, AppState.lineStyle, projectName, columnNamesJson, customPaletteJson, rootColor);
    downloadBlob(new Blob([html], { type: 'text/html;charset=utf-8' }), 'mindtree-apresentacao.html');
  }

<script>
const TREE_DATA = JSON.parse(document.getElementById('mindtree-data').textContent);
const COLOR_LEVELS = ${colorLevels};
const CONTAINER_SHAPE = '${containerShape}';
const CONTAINER_HEIGHT = '${containerHeight}';
const LINE_STYLE = '${lineStyle}';
const CUSTOM_PALETTE = ${customPaletteJson};
const ROOT_COLOR = '${rootColor}';

function theme(){
  const attr = document.documentElement.getAttribute('data-theme');
  if (attr === 'dark' || attr === 'light') return attr;
  return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
}

function bestTextColor(hex){
  const h = hex.replace('#', '');
  const r = parseInt(h.substr(0, 2), 16) / 255;
  const g = parseInt(h.substr(2, 2), 16) / 255;
  const b = parseInt(h.substr(4, 2), 16) / 255;
  const lin = c => c <= 0.03928 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4);
  const luminance = 0.2126 * lin(r) + 0.7152 * lin(g) + 0.0722 * lin(b);
  const contrastWithWhite = (1.05) / (luminance + 0.05);
  return contrastWithWhite >= 3.2 ? '#ffffff' : '#1c1e22';
}

function adjustForLightTheme(hex){
  const h = hex.replace('#', '');
  let r = parseInt(h.substr(0, 2), 16);
  let g = parseInt(h.substr(2, 2), 16);
  let b = parseInt(h.substr(4, 2), 16);
  const mix = (c) => Math.round(c + (255 - c) * 0.06);
  r = mix(r); g = mix(g); b = mix(b);
  return '#' + [r, g, b].map(c => c.toString(16).padStart(2, '0')).join('');
}

function colorPairFromHex(hex){
  const dark = hex;
  const light = adjustForLightTheme(hex);
  return {
    dark: { fill: dark, text: bestTextColor(dark) },
    light: { fill: light, text: bestTextColor(light) }
  };
}

function rootColorPair(){
  const t = theme();
  return colorPairFromHex(ROOT_COLOR || '#5a5b64')[t];
}

function colorByIndex(idx){
  const t = theme();
  if (idx === null || idx === undefined) return rootColorPair();
  const palette = (CUSTOM_PALETTE && CUSTOM_PALETTE.length) ? CUSTOM_PALETTE : ['#888888'];
  const hex = palette[idx % palette.length] || palette[0];
  return colorPairFromHex(hex)[t];
}

const CIRCLE_R=9, CAPSULE_H_MAX=36, CAPSULE_H_MIN=22, CAPSULE_GAP=14, MIN_CAPSULE_W=70, PAD_X=14, ROW_H=46, LEVEL_GAP=64, PADDING=90, CHAR_W=7.6;
function getCapsuleH(){ return CONTAINER_HEIGHT === 'min' ? CAPSULE_H_MIN : CAPSULE_H_MAX; }
function getContainerRadius(h){
  if (CONTAINER_SHAPE === 'rect') return 0;
  if (CONTAINER_SHAPE === 'rounded') return 6;
  return h / 2;
}
const ZOOM_MIN=0.15, ZOOM_MAX=2.5;
const svg = d3.select('#tree-svg');
const wrap = document.getElementById('canvas-wrap');
const zoomLayer = svg.append('g').attr('class','zoom-layer');
let currentTransform = d3.zoomIdentity;

function updateZoomPct(){
  const el = document.getElementById('zoom-pct');
  if (el) el.textContent = Math.round(currentTransform.k * 100) + '%';
}

const zoomBehavior = d3.zoom()
  .scaleExtent([ZOOM_MIN, ZOOM_MAX])
  .filter((event) => {
    if (event.type === 'wheel') return true;
    if (event.type === 'mousedown') return event.button === 0 || event.button === 1;
    return !event.button;
  })
  .on('zoom', (event) => {
    currentTransform = event.transform;
    zoomLayer.attr('transform', currentTransform);
    updateZoomPct();
  })
  .on('start', (event) => {
    if (event.sourceEvent && event.sourceEvent.button === 1) svg.classed('panning', true);
  })
  .on('end', () => svg.classed('panning', false));

svg.call(zoomBehavior).on('dblclick.zoom', null);
svg.node().addEventListener('mousedown', ev => { if (ev.button === 1) ev.preventDefault(); });
svg.node().addEventListener('auxclick', ev => { if (ev.button === 1) ev.preventDefault(); });

function zoomBy(factor){ svg.transition().duration(200).call(zoomBehavior.scaleBy, factor); }

    render();

  /* ---------- IMPORTAR ---------- */
  function rowsToTree(rows){
    // rows: array de { cells: [nivel1, nivel2, ...], text, origem }
    // reconstrói hierarquia baseada na posição da coluna preenchida (nível)
    // e na ordem sequencial das linhas usando uma pilha de "último nó em cada nível"
    const root = TreeModel.createNode('Importado', '');
    const lastAtLevel = {};
    rows.forEach(r => {
      const level = r.cells.findIndex(c => c && String(c).trim() !== '');
      if (level === -1) return;
      const name = String(r.cells[level]).trim();
      const node = TreeModel.createNode(name, r.text || '');
      if (level === 0) {
        root.children.push(node);
      } else {
        const parent = lastAtLevel[level - 1] || root;
        parent.children.push(node);
      }
      lastAtLevel[level] = node;
      // limpa níveis mais profundos que o atual (novo ramo)
      Object.keys(lastAtLevel).forEach(k => { if (parseInt(k) > level) delete lastAtLevel[k]; });
    });
    // se só há um filho no nível 0 e raiz "Importado" é redundante, promove
    if (root.children.length === 1) return root.children[0];
    return root;
  }

  /* ---------- CAMPOS COMBINADOS (tabela tradicional tipo banco de dados) ----------
     Formato: cada linha tem TODAS as colunas de nível preenchidas, repetindo
     valores de categoria/subcategoria. Ex:
       Categoria   Subcategoria  Item
       Tecnologia  Smartphones   iPhone 15
       Tecnologia  Smartphones   Galaxy S24
     Diferente do formato nativo (uma coluna por linha, célula vazia nas demais),
     aqui agrupamos valores repetidos em um único nó com vários filhos, e
     ordenamos as colunas de A-Z da ÚLTIMA para a PRIMEIRA antes de agrupar —
     isso garante que dados desorganizados fiquem agrupados corretamente mesmo
     que não venham em blocos contíguos no arquivo original. */
  function looksLikeCombinedFields(header, body, levelColCount){
    // heurística: é "campos combinados" se a maioria das linhas tem MAIS DE UMA
    // coluna de nível preenchida na mesma linha (formato nativo só preenche 1 por linha)
    if (levelColCount < 2) return false;
    let multiFilledCount = 0;
    let checked = 0;
    for (const row of body) {
      const cells = row.slice(0, levelColCount);
      if (!cells.some(c => c && String(c).trim() !== '')) continue;
      checked++;
      const filledCount = cells.filter(c => c && String(c).trim() !== '').length;
      if (filledCount > 1) multiFilledCount++;
      if (checked >= 20) break; // amostra suficiente
    }
    return checked > 0 && (multiFilledCount / checked) > 0.5;
  }

    const sorted = [...body].sort((a, b) => {
      for (let col = levelColCount - 1; col >= 0; col--){
        const av = String(a[col] ?? '').trim();
        const bv = String(b[col] ?? '').trim();
        const cmp = av.localeCompare(bv, 'pt-BR', { sensitivity: 'base' });
        if (cmp !== 0) return cmp;
